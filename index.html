<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appgroo — Home</title>
<style>
  :root {
    /* Warm, welcoming palette */
    --bg: #FBF7F2;
    --surface: #FFFFFF;
    --surface-soft: #FDF9F4;
    --surface-warm: #FFF7F0;

    --ink: #1A1817;
    --ink-soft: #57524D;
    --ink-dim: #8A847E;
    --ink-ghost: #BCB7B1;

    --line: #EFE8DF;
    --line-strong: #E2D9CC;

    --accent: #FF6B4A;
    --accent-hover: #E85A3D;
    --accent-soft: #FFEBE3;
    --accent-ink: #B84426;

    --grad: linear-gradient(135deg, #FF7A59 0%, #FF5C8D 100%);
    --grad-soft: linear-gradient(135deg, #FFF0EA 0%, #FFEBF3 100%);

    --success: #0A9B6B;
    --success-bg: #E4F5EE;
    --warning: #B87100;
    --warning-bg: #FFF1D9;
    --danger: #D23A3A;
    --danger-bg: #FDECEC;

    --shadow-xs: 0 1px 2px rgba(32, 20, 8, 0.04);
    --shadow-sm: 0 2px 6px rgba(32, 20, 8, 0.05), 0 1px 2px rgba(32, 20, 8, 0.04);
    --shadow-md: 0 10px 28px rgba(32, 20, 8, 0.07), 0 2px 6px rgba(32, 20, 8, 0.04);
    --shadow-lg: 0 24px 56px rgba(32, 20, 8, 0.08), 0 4px 12px rgba(32, 20, 8, 0.04);
    --shadow-glow: 0 0 0 4px rgba(255, 107, 74, 0.12);

    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 20px;
    --r-xl: 28px;
    --r-pill: 999px;
  }

  /* ============ DARK THEME ============ */
  body.theme-dark {
    --bg: #14110F;
    --surface: #1E1A17;
    --surface-soft: #221D1A;
    --surface-warm: #26201C;

    --ink: #F5EFE8;
    --ink-soft: #C9C0B6;
    --ink-dim: #8F8780;
    --ink-ghost: #5E5751;

    --line: #2E2824;
    --line-strong: #3B3430;

    --accent: #FF8362;
    --accent-hover: #FF9A7E;
    --accent-soft: #3A1F16;
    --accent-ink: #FFC4B0;

    --grad: linear-gradient(135deg, #FF8362 0%, #FF6FA0 100%);
    --grad-soft: linear-gradient(135deg, #2A1C17 0%, #2B1A23 100%);

    --success: #3AD6A0;
    --success-bg: #133B2E;
    --warning: #E4A437;
    --warning-bg: #3A2A10;
    --danger: #F26464;
    --danger-bg: #3A1B1B;

    --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.45), 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 10px 28px rgba(0, 0, 0, 0.55), 0 2px 6px rgba(0, 0, 0, 0.35);
    --shadow-lg: 0 24px 56px rgba(0, 0, 0, 0.65), 0 4px 12px rgba(0, 0, 0, 0.4);
    --shadow-glow: 0 0 0 4px rgba(255, 131, 98, 0.18);
  }
  body.theme-dark .proto-header {
    background: rgba(20, 17, 15, 0.72);
    border-bottom-color: rgba(46, 40, 36, 0.9);
  }
  body.theme-dark .proto-nav {
    background: rgba(30, 26, 23, 0.7);
  }
  body.theme-dark .proto-link.active { background: var(--grad); color: #fff; }
  body.theme-dark::before {
    background:
      radial-gradient(900px 520px at 18% -5%,  rgba(255, 131, 98, 0.18) 0%, transparent 60%),
      radial-gradient(900px 600px at 82% 0%,   rgba(255, 111, 160, 0.14) 0%, transparent 60%),
      radial-gradient(700px 400px at 50% 100%, rgba(255, 131, 98, 0.10) 0%, transparent 60%);
  }
  /* Fix contrast for user chat bubble in dark mode (default uses --ink bg + #fff text) */
  body.theme-dark .chat-msg.user .chat-bubble {
    background: var(--surface-warm);
    color: var(--ink);
    border-color: var(--line-strong);
  }

  /* Theme toggle button */
  .theme-toggle {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.18s;
    font-family: inherit;
  }
  .theme-toggle:hover {
    background: var(--surface-warm);
    border-color: var(--line-strong);
    color: var(--ink);
    transform: translateY(-50%) scale(1.05);
  }
  .theme-toggle svg { width: 16px; height: 16px; display: block; }
  .theme-toggle .icon-moon { display: block; }
  .theme-toggle .icon-sun { display: none; }
  body.theme-dark .theme-toggle .icon-moon { display: none; }
  body.theme-dark .theme-toggle .icon-sun { display: block; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient warm gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: -10%;
    background:
      radial-gradient(900px 520px at 18% -5%,  rgba(255, 183, 148, 0.55) 0%, transparent 60%),
      radial-gradient(900px 600px at 82% 0%,   rgba(255, 164, 197, 0.45) 0%, transparent 60%),
      radial-gradient(700px 420px at 50% 110%, rgba(255, 214, 170, 0.38) 0%, transparent 70%);
    filter: blur(6px);
    pointer-events: none;
    z-index: -1;
  }

  /* Prototype header (state switcher) */
  .proto-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(251, 247, 242, 0.72);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid rgba(239, 232, 223, 0.8);
    padding: 10px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .brand {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .brand-mark {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: var(--grad);
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px;
    box-shadow: 0 3px 8px rgba(255, 107, 74, 0.25);
  }

  .proto-nav {
    display: inline-flex;
    gap: 2px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 3px;
  }
  .proto-link {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    border-radius: var(--r-pill);
    background: transparent;
    border: none;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: all 0.18s;
  }
  .proto-link:hover { color: var(--ink); }
  .proto-link.active {
    background: var(--ink);
    color: #fff;
  }

  /* Page */
  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 56px 28px 120px;
  }
  .section { margin-bottom: 64px; }
  .section:last-child { margin-bottom: 0; }

  /* Wireframes view: full-bleed iframe below the proto header */
  body.view-wireframes .page { max-width: none; margin: 0; padding: 0; }
  .screens-frame-wrap {
    position: fixed;
    top: var(--proto-header-h, 56px);
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    background: #2B2B2B;
  }
  .screens-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* Wireframes view with Web/In-app sub-tabs */
  .wireframes-wrap {
    position: fixed;
    top: var(--proto-header-h, 56px);
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    background: #2B2B2B;
  }
  .wireframes-subnav {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    background: #1F1F1F;
    border-bottom: 1px solid #2E2E2E;
    flex: none;
  }
  .wf-tab {
    background: transparent;
    color: #BFBFBF;
    border: 1px solid #3A3A3A;
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .wf-tab:hover { color: #FFF; border-color: #555; }
  .wf-tab.active {
    background: #FFF;
    color: #111;
    border-color: #FFF;
  }
  .wireframes-frame-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #2B2B2B;
  }

  /* Landing view */
  body.view-landing {
    background:
      radial-gradient(circle at center, #D8D8D8 0.9px, transparent 1.2px) 0 0 / 18px 18px,
      #F3F3F3;
  }
  body.view-landing .proto-header {
    background: rgba(243, 243, 243, 0.85);
    backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid #E6E6E6;
  }
  body.view-landing .page { max-width: 1100px; }

  .landing-ref {
    min-height: calc(100vh - var(--proto-header-h, 56px) - 80px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  }
  .landing-content {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 18px;
  }
  .landing-title {
    margin: 0;
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #0B0B0B;
    background: none;
    -webkit-text-fill-color: initial;
  }
  .landing-sub {
    margin: 0;
    font-size: 15px;
    color: #5A5A5A;
  }

  .landing-toggle {
    display: inline-flex;
    background: #E8E8E8;
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
    margin-top: 6px;
  }
  .ld-tab {
    background: transparent;
    color: #5A5A5A;
    border: 0;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .ld-tab:hover { color: #111; }
  .ld-tab.active {
    background: #111;
    color: #FFF;
  }

  .landing-chat {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid #ECECEC;
    border-radius: 18px;
    padding: 18px 18px 14px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.02);
    margin-top: 6px;
    text-align: left;
  }
  .landing-input {
    width: 100%;
    border: 0;
    outline: 0;
    resize: none;
    font: inherit;
    font-size: 15px;
    line-height: 1.5;
    color: #1A1A1A;
    background: transparent;
    min-height: 84px;
  }
  .landing-input::placeholder { color: #9A9A9A; }
  .landing-chat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .landing-plus-wrap {
    position: relative;
    display: inline-flex;
  }
  .landing-plus-menu {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    min-width: 168px;
    background: #FFFFFF;
    border: 1px solid #ECECEC;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    padding: 4px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .landing-plus-menu[hidden] { display: none; }
  .lp-item {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 0;
    background: transparent;
    color: #1A1A1A;
    font-size: 13.5px;
    cursor: pointer;
    text-align: left;
  }
  .lp-item:hover { background: #F4F4F4; }
  .lp-item svg { color: #5A5A5A; flex: none; }

  .landing-plus, .landing-send {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1px solid #ECECEC;
    background: #FFFFFF;
    color: #5A5A5A;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .landing-plus:hover, .landing-send:hover {
    background: #F4F4F4;
    color: #111;
    border-color: #DDD;
  }

  .landing-pills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
  }
  .ld-pill {
    background: #FFFFFF;
    border: 1px solid #ECECEC;
    color: #1A1A1A;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .ld-pill:hover { border-color: #D5D5D5; background: #FAFAFA; }
  .ld-pill:active { transform: translateY(1px); }
  .ld-pill.active {
    background: #111;
    color: #FFF;
    border-color: #111;
  }
  .landing-pills--type {
    margin-top: 2px;
    padding-top: 12px;
    border-top: 1px dashed #DCDCDC;
  }
  .ld-pill--type {
    background: #FFFFFF;
    color: #5A5A5A;
    border-color: #ECECEC;
    font-size: 12.5px;
    padding: 6px 12px;
  }
  .ld-pill--type:hover {
    color: #111;
    background: #F4F4F4;
    border-color: #D5D5D5;
  }
  .ld-pill.is-hidden { display: none; }
  .ld-pill--more {
    background: transparent;
    border-color: transparent;
    color: #5A5A5A;
    font-weight: 500;
  }
  .ld-pill--more:hover {
    background: #ECECEC;
    border-color: #ECECEC;
    color: #111;
  }

  /* Audit view — reuses Landing chrome and adds the What-you-get cards */
  body.view-audit {
    background:
      radial-gradient(circle at center, #D8D8D8 0.9px, transparent 1.2px) 0 0 / 18px 18px,
      #F3F3F3;
  }
  body.view-audit .proto-header {
    background: rgba(243, 243, 243, 0.85);
    backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid #E6E6E6;
  }
  body.view-audit .page { max-width: 1100px; }

  .audit-benefits {
    width: 100%;
    margin-top: 24px;
    text-align: center;
  }
  .audit-benefits-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #111;
    margin: 0 0 18px;
  }
  .audit-cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }
  @media (max-width: 720px) {
    .audit-cards { grid-template-columns: 1fr; }
  }
  .audit-card {
    background: #FFFFFF;
    border: 1px solid #ECECEC;
    border-radius: 18px;
    padding: 28px 20px;
    text-align: center;
    transition: border-color .15s ease, transform .15s ease;
  }
  .audit-card:hover { border-color: #D5D5D5; }
  .audit-card-emoji {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 14px;
  }
  .audit-card-title {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    color: #1A1A1A;
  }
  .audit-card-sub {
    margin: 6px 0 0;
    font-size: 13px;
    line-height: 1.45;
    color: #6B6B6B;
  }

  /* Audit chat — half the Landing height */
  .audit-chat .landing-input {
    min-height: 42px;
  }

  /* Audit submit (text button) */
  .audit-submit {
    height: 32px;
    padding: 0 14px;
    background: #111;
    color: #FFF;
    border: 0;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .audit-submit:hover { background: #000; }
  .audit-submit:active { transform: translateY(1px); }

  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 28px;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid var(--line);
    padding: 6px 14px;
    border-radius: var(--r-pill);
    box-shadow: var(--shadow-xs);
    margin-bottom: 20px;
  }
  .hero-title {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -1.6px;
    line-height: 1.05;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .hero-title .grad {
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    padding-right: 2px;
  }
  .hero-sub {
    font-size: 17px;
    color: var(--ink-soft);
    max-width: 540px;
    margin: 0 auto;
  }
  .hero.compact .hero-title { font-size: 40px; letter-spacing: -1.2px; }
  .hero.compact .hero-sub { font-size: 15.5px; }

  /* Unified home spacing — first-visit + returning share the same rhythm */
  body.view-new .page,
  body.view-return .page {
    padding-top: 48px;
    padding-bottom: 96px;
  }
  body.view-new .hero,
  body.view-return .hero.compact {
    margin-bottom: 32px;
  }
  body.view-new .hero .hero-title,
  body.view-return .hero.compact .hero-title {
    margin-bottom: 14px;
  }
  body.view-new .section,
  body.view-return .section {
    margin-bottom: 56px;
  }

  /* Composer */
  .composer {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-lg);
    padding: 18px 18px 14px;
    max-width: 720px;
    margin: 0 auto;
    cursor: text;
    transition: box-shadow 0.25s, border-color 0.2s, transform 0.25s;
  }
  .composer:focus-within {
    border-color: var(--accent);
    box-shadow: var(--shadow-lg), var(--shadow-glow);
  }
  /* Collapsed / Expanded composer visibility */
  .composer-form { display: none; }
  .composer.expanded .composer-collapsed { display: none; }
  .composer.expanded .composer-form { display: block; }
  .composer.expanded { padding: 20px 22px 18px; }

  /* Form inside composer */
  .composer-form {
    max-height: min(70vh, 640px);
    overflow-y: auto;
    padding: 2px 4px 2px 2px;
    animation: form-in 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes form-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  .composer-form::-webkit-scrollbar { width: 8px; }
  .composer-form::-webkit-scrollbar-track { background: transparent; }
  .composer-form::-webkit-scrollbar-thumb {
    background: var(--line-strong);
    border-radius: 4px;
  }
  .composer-form::-webkit-scrollbar-thumb:hover { background: var(--ink-ghost); }

  .q-block { margin-bottom: 22px; }
  .q-block:last-of-type { margin-bottom: 14px; }
  .q-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.1px;
  }
  .q-hint {
    font-size: 13px;
    color: var(--ink-dim);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .q-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .q-chip {
    padding: 8px 14px;
    background: var(--surface-warm);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    color: var(--ink);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .q-chip:hover {
    border-color: var(--line-strong);
    background: #F3ECE2;
  }
  .q-chip.selected {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .q-other {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    color: var(--ink);
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
    width: 120px;
    transition: border-color 0.15s, width 0.2s;
  }
  .q-other::placeholder { color: var(--ink-dim); }
  .q-other:focus {
    border-color: var(--accent);
    width: 200px;
  }
  .q-input, .q-textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    background: var(--surface);
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    line-height: 1.4;
  }
  .q-input::placeholder, .q-textarea::placeholder { color: var(--ink-dim); }
  .q-input:focus, .q-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.14);
  }
  .q-textarea {
    min-height: 72px;
    resize: vertical;
    line-height: 1.5;
  }

  .composer-form-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 14px;
    margin-top: 10px;
    border-top: 1px solid var(--line);
    position: sticky;
    bottom: 0;
    background: var(--surface);
  }
  .composer-form-footer .footer-hint {
    font-size: 12.5px;
    color: var(--ink-dim);
  }
  .continue-btn {
    padding: 10px 22px;
    background: var(--grad);
    color: #fff;
    border: none;
    border-radius: var(--r-pill);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(255, 107, 74, 0.28);
    transition: transform 0.14s, box-shadow 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .continue-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(255, 107, 74, 0.32);
  }
  .continue-btn:active { transform: translateY(0); }
  .composer-input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 17px;
    color: var(--ink);
    padding: 10px 8px 14px;
    resize: none;
    min-height: 54px;
    line-height: 1.5;
  }
  .composer-input::placeholder { color: var(--ink-dim); }
  .composer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .composer-chips {
    display: flex; gap: 8px; flex-wrap: wrap; flex: 1;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: var(--r-pill);
    background: var(--surface-warm);
    border: 1px solid var(--line);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    white-space: nowrap;
  }
  .chip:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent-ink);
  }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: var(--r-pill);
    border: none;
    background: var(--ink);
    color: #fff;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: transform 0.12s, background 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(.disabled) { transform: translateY(-1px); background: #000; }
  .send-btn.disabled {
    background: var(--line-strong);
    color: var(--ink-ghost);
    cursor: not-allowed;
    opacity: 0.9;
  }

  /* Chat thread (appears when user has started chatting) */
  .chat-thread {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 14px;
    padding: 4px 4px 8px;
  }
  .chat-thread:empty { display: none; }
  .chat-msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    max-width: 92%;
  }
  .chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .chat-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: #fff;
    background: var(--ink);
  }
  .chat-msg.ai .chat-avatar {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: var(--grad);
    box-shadow: 0 4px 10px rgba(255, 107, 74, 0.28);
    font-size: 0;
    color: transparent;
  }
  .chat-msg.ai .chat-avatar svg {
    width: 60%;
    height: 60%;
    display: block;
    filter: drop-shadow(0 1px 1px rgba(155, 40, 20, 0.15));
  }
  .chat-msg.user .chat-avatar { background: var(--grad); }
  .chat-bubble {
    background: var(--surface-warm);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.55;
  }
  .chat-msg.user .chat-bubble {
    background: var(--grad-soft);
    border-color: var(--accent-soft);
  }

  /* Bot prompt inside the composer — real chat feel */
  .chat-prompt {
    display: block;
    margin-bottom: 10px;
  }
  .chat-prompt .chat-msg {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 10px;
    align-items: flex-start;
    max-width: 100%;
    width: 100%;
  }
  .chat-prompt .chat-bubble {
    font-size: 15px;
    padding: 11px 16px;
    border-radius: 14px 14px 14px 4px;
    box-sizing: border-box;
    width: 100%;
    min-height: 0;
  }
  .composer .chat-prompt {
    margin-bottom: 10px;
  }

  /* Quick-reply options — user-side pill buttons */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
    margin-bottom: 16px;
  }
  .quick-reply {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    border-radius: 14px 14px 4px 14px;
    background: var(--grad-soft);
    border: 1px solid var(--accent-soft);
    color: var(--accent-ink);
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(255, 107, 74, 0.06);
    transition: transform 0.15s ease, background 0.18s, box-shadow 0.2s, border-color 0.18s;
  }
  .quick-reply:hover {
    transform: translateY(-1px);
    border-color: var(--accent);
    box-shadow: 0 6px 16px rgba(255, 107, 74, 0.18);
  }
  .quick-reply:active {
    transform: translateY(0);
    box-shadow: 0 1px 2px rgba(255, 107, 74, 0.08);
  }
  /* "Other…" — the escape hatch, more neutral */
  .quick-reply-other {
    background: var(--surface-soft);
    border-color: var(--line);
    color: var(--ink-soft);
    box-shadow: none;
  }
  .quick-reply-other:hover {
    background: var(--surface-warm);
    border-color: var(--line-strong);
    color: var(--ink);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }
  .composer-collapsed .quick-replies {
    margin-bottom: 0;
  }

  /* Section headings */
  .section-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .sec-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .sec-title-centered {
    display: block;
    text-align: center;
    margin-bottom: 22px;
  }
  .sec-sub {
    display: block;
    font-size: 14px;
    color: var(--ink-soft);
    font-weight: 400;
    margin-top: 6px;
  }

  /* Connect cards (plugins) */
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 860px;
    margin: 0 auto;
  }
  .connect-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px 18px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    display: flex;
    gap: 14px;
    align-items: center;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow-xs);
    position: relative;
    overflow: hidden;
  }
  .connect-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--grad-soft);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .connect-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: transparent;
  }
  .connect-card:hover::before { opacity: 0.55; }
  .connect-card > * { position: relative; z-index: 1; }
  .connect-emoji {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--surface-warm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    border: 1px solid var(--line);
  }
  .connect-title {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .connect-desc {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  /* Centered explore cards */
  .explore-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 28px 20px 24px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    text-align: center;
    box-shadow: var(--shadow-xs);
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .explore-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--accent-soft);
  }
  .explore-emoji {
    font-size: 36px;
    margin-bottom: 10px;
    display: block;
    line-height: 1;
  }
  .explore-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .explore-desc {
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* Metrics */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow-xs);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .metric-card:hover {
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }
  .metric-label {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .metric-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }
  .metric-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .delta {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: var(--r-pill);
  }
  .delta.up { color: var(--success); background: var(--success-bg); }
  .delta.down { color: var(--danger); background: var(--danger-bg); }
  .delta.flat { color: var(--ink-soft); background: var(--surface-warm); }

  /* Date picker */
  .date-picker {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    font-family: inherit;
  }
  .date-picker:hover { border-color: var(--line-strong); color: var(--ink); }
  .date-picker .caret { font-size: 9px; }
  .date-picker-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    min-width: 180px;
    padding: 6px;
    display: none;
    z-index: 20;
    text-align: left;
  }
  .date-picker-menu.open { display: block; }
  .date-picker-menu .item {
    padding: 8px 12px;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink);
  }
  .date-picker-menu .item:hover { background: var(--surface-warm); }
  .date-picker-menu .item.active {
    background: var(--accent-soft);
    font-weight: 600;
    color: var(--accent-ink);
  }

  /* Table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    overflow-x: auto;
    box-shadow: var(--shadow-xs);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead th {
    text-align: left;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 14px 16px;
    background: var(--surface-soft);
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  thead th.num { text-align: right; }
  thead th.center { text-align: center; width: 40px; }
  thead th.sortable { cursor: pointer; user-select: none; position: relative; }
  thead th.sortable:hover { color: var(--ink); }
  /* Sort arrow floats at the cell edge so it doesn't shift the column's text content */
  thead th.sortable .sort-arrow {
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9px;
    color: var(--ink-ghost);
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    pointer-events: none;
  }
  thead th.sortable:hover .sort-arrow { opacity: 0.5; }
  thead th.sortable.sorted .sort-arrow { opacity: 1; color: var(--ink); }
  tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
    color: var(--ink);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.12s; }
  tbody tr:hover { background: var(--surface-warm); }
  tbody tr.row-draft { opacity: 0.6; }
  tbody tr.row-draft:hover { opacity: 0.85; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.center { text-align: center; }
  thead th:nth-child(5),
  tbody td:nth-child(5) { padding-left: 28px; }

  /* Type icons */
  .type-icon-sm {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    cursor: default;
  }
  .type-icon-sm svg { width: 12px; height: 12px; }
  .type-icon-sm.type-web { background: #E6F0FF; color: #2F6BFF; }
  .type-icon-sm.type-web2app { background: #F0EBFF; color: #6B4EDD; }
  .type-icon-sm.type-inapp { background: #E4F5EE; color: #0A9B6B; }
  .type-icon-sm.type-experiment { background: #FFEEDB; color: #B5520C; }

  /* Tooltips */
  .type-icon-sm[data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(2px);
    background: var(--ink);
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 8px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 40;
  }
  .type-icon-sm[data-tip]:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .name-wrap { display: inline-flex; align-items: center; gap: 10px; }
  a.name-cell {
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
  }
  a.name-cell:hover { color: var(--accent); }

  /* Pills */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: var(--r-pill);
    font-size: 11.5px;
    font-weight: 600;
  }
  .pill::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .pill-active { background: var(--success-bg); color: var(--success); }
  .pill-active::before { background: var(--success); }
  .pill-paused { background: var(--warning-bg); color: var(--warning); }
  .pill-paused::before { background: var(--warning); }
  .pill-draft {
    background: var(--surface-warm);
    color: var(--ink-dim);
    border: 1px solid var(--line);
  }
  .pill-draft::before { background: var(--ink-ghost); }

  .status-stack { position: relative; display: inline-flex; cursor: default; }
  .status-stack .updated-cell {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(2px);
    background: var(--ink);
    color: #fff;
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 40;
  }
  .status-stack:hover .updated-cell {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .link-wrap { display: inline-flex; align-items: center; gap: 6px; }
  .link-cell {
    color: var(--accent);
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: 12px;
    text-decoration: none;
  }
  .link-cell:hover { text-decoration: underline; }
  .link-copy {
    opacity: 0;
    cursor: pointer;
    color: var(--ink-ghost);
    font-size: 12px;
    background: none;
    border: none;
    padding: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .link-copy:hover { color: var(--ink); }
  .link-wrap:hover .link-copy { opacity: 1; }

  thead th:nth-child(2),
  tbody td:nth-child(2) { white-space: nowrap; width: 1%; }

  /* Experiment tooltips */
  .exp-visitors, .exp-conversion {
    position: relative;
    cursor: default;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .exp-conversion .exp-trophy { font-size: 11px; }
  .exp-tip {
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    background: var(--ink);
    color: #fff;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 40;
    line-height: 1.5;
  }
  .exp-visitors:hover .exp-tip,
  .exp-conversion:hover .exp-tip { opacity: 1; }

  /* More menu */
  .more-btn {
    background: transparent;
    border: none;
    width: 30px; height: 30px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  .more-btn:hover { background: var(--surface-warm); color: var(--ink); }

  .more-menu-wrap { position: relative; display: inline-block; }
  .more-menu {
    position: absolute;
    right: 0;
    top: 36px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    min-width: 150px;
    padding: 4px;
    z-index: 30;
    display: none;
    text-align: left;
  }
  .more-menu.open { display: block; }
  .more-menu .item {
    padding: 8px 10px;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink);
  }
  .more-menu .item:hover { background: var(--surface-warm); }

  /* Responsive */
  @media (max-width: 960px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    .table-card { overflow-x: auto; }
    .hero-title { font-size: 38px; }
    .hero.compact .hero-title { font-size: 30px; }
  }
  @media (max-width: 560px) {
    .page { padding: 36px 18px 80px; }
    .grid-3 { grid-template-columns: 1fr; }
    .hero-title { font-size: 32px; letter-spacing: -1px; }
    .hero-sub { font-size: 15px; }
    .composer { padding: 14px 14px 12px; }
    .composer-input { font-size: 16px; }
    .brand { position: static; transform: none; }
    .proto-header { justify-content: space-between; gap: 12px; }
  }

  /* ============ FUNNEL BUILDER VIEW ============ */
  /* Make the page escape .page's max-width when the builder is active */
  body.view-builder .page {
    max-width: none;
    margin: 0;
    padding: 0;
  }

  .builder {
    display: block;
    max-width: none;
    margin: 0;
    /* left offset = sidebar width + 24 gap (visually separates sidebar from builder view) */
    padding: 24px 28px 40px calc(var(--builder-sidebar-w, 380px) + 24px);
    min-height: 100vh;
    box-sizing: border-box;
    transition: padding-left 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* Left sidebar — chat, fixed panel below the shared header (visually separated from builder view) */
  .builder-sidebar {
    position: fixed;
    top: var(--proto-header-h, 56px);
    left: 0;
    width: var(--builder-sidebar-w, 380px);
    height: calc(100vh - var(--proto-header-h, 56px));
    z-index: 40; /* below .proto-header (z-index: 50) so header stays visible across views */
    background: var(--surface);
    border: 0;
    border-right: 1px solid var(--line);
    border-radius: 0;
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* Collapsed chat sidebar (used in Edit mode) */
  body.is-chat-collapsed { --builder-sidebar-w: 60px; }
  body.is-chat-collapsed .builder-sidebar .chat-thread,
  body.is-chat-collapsed .builder-sidebar .sidebar-composer { display: none; }

  /* Collapse button — floats in the sidebar (no sidebar head anymore) */
  .sidebar-collapse-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface-warm);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    z-index: 5;
    box-shadow: var(--shadow-xs);
    transition: background 0.15s, border-color 0.15s, color 0.15s,
                top 0.2s, right 0.2s, left 0.2s, transform 0.2s;
  }
  .sidebar-collapse-btn:hover {
    background: var(--surface);
    border-color: var(--line-strong);
    color: var(--ink);
  }
  .sidebar-collapse-btn svg { width: 14px; height: 14px; display: block; transition: transform 0.2s; }

  /* When collapsed, center the button at the top of the rail */
  body.is-chat-collapsed .sidebar-collapse-btn {
    top: 14px;
    right: auto;
    left: 50%;
    transform: translateX(-50%);
  }
  body.is-chat-collapsed .sidebar-collapse-btn svg { transform: rotate(180deg); }

  /* Add a little top padding to the chat thread so the floating btn doesn't overlap the first message */
  .builder-sidebar .chat-thread { padding-top: 26px; }

  /* ===== Builder sub-header (tabs panel, sits ON TOP OF builder view, NOT inside sidebar) ===== */
  .builder-subheader {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md) var(--r-md) 0 0;
    padding: 0 8px 0 4px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-xs);
    height: 48px;
    overflow: hidden;
  }
  .builder-tabs {
    display: flex;
    gap: 0;
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    height: 100%;
    align-items: stretch;
    scrollbar-width: none;
  }
  .builder-tabs::-webkit-scrollbar { display: none; }
  .builder-tab {
    padding: 0 14px;
    background: transparent;
    border: 0;
    border-bottom: 2px solid transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-dim);
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    height: 100%;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .builder-tab:hover { color: var(--ink); background: var(--surface-warm); }
  .builder-tab.active {
    color: var(--accent-ink);
    border-bottom-color: var(--accent);
    background: var(--accent-soft);
  }
  /* Icon-only tab (Preview) */
  .builder-tab-icon {
    padding: 0;
    width: 44px;
    justify-content: center;
    flex-shrink: 0;
  }
  .builder-tab-icon svg { width: 16px; height: 16px; display: block; }
  .builder-subheader-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-right: 6px;
    flex-shrink: 0;
  }

  /* ===== Builder body (panes for each tab) ===== */
  .builder-body {
    background: var(--surface);
    border: 1px solid var(--line);
    border-top: 0;
    border-radius: 0 0 var(--r-md) var(--r-md);
    box-shadow: var(--shadow-xs);
    min-height: calc(100vh - var(--proto-header-h, 56px) - 48px - 70px);
    display: flex;
    flex-direction: column;
  }
  .builder-tab-pane { display: none; flex: 1; flex-direction: column; }
  .builder-tab-pane.active { display: flex; }
  .builder-empty {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    padding: 60px 24px;
    color: var(--ink-dim); font-size: 14px; text-align: center;
  }
  .builder-empty-emoji { font-size: 28px; margin-bottom: 4px; }
  .builder-empty-title { font-size: 16px; font-weight: 600; color: var(--ink); }
  .builder-empty-sub { font-size: 13px; color: var(--ink-dim); max-width: 320px; }
  .sidebar-head {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-head-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.1px;
  }
  .sidebar-head-sub {
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 2px;
  }
  .sidebar-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--grad);
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 14px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(255, 107, 74, 0.35);
  }
  .chat-thread {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .chat-msg {
    display: flex;
    gap: 10px;
    max-width: 100%;
    animation: msg-in 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .chat-msg.user { flex-direction: row-reverse; }
  .chat-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .chat-msg.ai .chat-avatar {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: var(--grad);
    color: transparent;
    font-size: 0;
    box-shadow: 0 4px 10px rgba(255, 107, 74, 0.28);
    position: relative;
  }
  .chat-msg.ai .chat-avatar svg {
    width: 60%;
    height: 60%;
    display: block;
    filter: drop-shadow(0 1px 1px rgba(155, 40, 20, 0.15));
  }
  .chat-msg.user .chat-avatar {
    background: var(--surface-warm);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    font-weight: 600;
    align-self: flex-end;   /* anchor to bottom of bubble */
    margin-top: 0;
    margin-bottom: 2px;
  }
  .chat-bubble {
    background: var(--surface-warm);
    border: 1px solid var(--line);
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    max-width: 260px;
  }
  .chat-msg.user .chat-bubble {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .chat-summary-card {
    background: var(--surface-warm);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .chat-summary-card strong { color: var(--ink); font-weight: 600; }
  .chat-summary-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 4px 0;
  }
  .chat-summary-row + .chat-summary-row {
    border-top: 1px dashed var(--line);
  }
  .chat-summary-key { color: var(--ink-dim); }
  .chat-summary-val { color: var(--ink); font-weight: 500; text-align: right; }

  .typing-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 2px;
  }
  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing-bounce 1.2s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .sidebar-composer {
    border-top: 1px solid var(--line);
    padding: 14px 16px 16px;
    background: var(--surface);
  }
  .sidebar-input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface-warm);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 10px 12px;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .sidebar-input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: var(--shadow-glow);
    background: var(--surface);
  }
  .sidebar-input {
    flex: 1;
    border: 0;
    outline: none;
    background: transparent;
    resize: none;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    min-height: 22px;
    max-height: 120px;
  }
  .sidebar-input::placeholder { color: var(--ink-ghost); }
  .sidebar-send {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 0;
    background: var(--grad);
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(255, 107, 74, 0.35);
    transition: transform 0.18s;
    flex-shrink: 0;
  }
  .sidebar-send:hover { transform: scale(1.06); }
  .sidebar-send.disabled { opacity: 0.5; pointer-events: none; box-shadow: none; }

  /* Right side — preview */
  .builder-preview {
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    display: flex;
    flex-direction: column;
  }
  .preview-head {
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .preview-head-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .generating-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 13px 7px 11px;
    background: var(--grad-soft);
    border: 1px solid rgba(255, 107, 74, 0.2);
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-ink);
  }
  .generating-pill::before {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 1.4s infinite ease-in-out;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 107, 74, 0.5); }
    50%      { transform: scale(1.15); opacity: 0.8; box-shadow: 0 0 0 6px rgba(255, 107, 74, 0); }
  }
  .preview-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.1px;
  }
  .preview-sub {
    font-size: 13px;
    color: var(--ink-dim);
    margin-top: 2px;
  }
  .preview-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-meta-chip {
    padding: 5px 10px;
    background: var(--surface-warm);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .preview-tool-btn {
    padding: 7px 13px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    font-size: 12.5px;
    color: var(--ink-soft);
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .preview-tool-btn:hover { background: var(--surface-warm); border-color: var(--line-strong); }

  /* Funnel card grid */
  .preview-grid-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 18px 18px 22px;
    background: transparent;
  }
  .funnel-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 14px;
  }
  .funnel-card { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s; }
  .funnel-card:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 20px rgba(255, 107, 74, 0.12), var(--shadow-sm);
    transform: translateY(-1px);
  }
  .funnel-card {
    aspect-ratio: 9 / 16;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 12px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 9px;
    position: relative;
    overflow: hidden;
    animation: card-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(6px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Staggered entrance — 4 cols */
  .funnel-card:nth-child(4n+1) { animation-delay: 0.00s; }
  .funnel-card:nth-child(4n+2) { animation-delay: 0.05s; }
  .funnel-card:nth-child(4n+3) { animation-delay: 0.10s; }
  .funnel-card:nth-child(4n+4) { animation-delay: 0.15s; }

  .funnel-card-num {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-ghost);
    letter-spacing: 0.03em;
  }

  /* Skeleton UI inside card */
  .sk {
    background: linear-gradient(
      90deg,
      rgba(239, 232, 223, 0.55) 0%,
      rgba(255, 230, 218, 0.9) 50%,
      rgba(239, 232, 223, 0.55) 100%
    );
    background-size: 200% 100%;
    border-radius: 4px;
    animation: sk-shimmer 1.6s linear infinite;
  }
  @keyframes sk-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .sk-header {
    height: 8px;
    width: 60%;
    margin-top: 10px;
  }
  .sk-title {
    height: 10px;
    width: 85%;
    margin-top: 4px;
  }
  .sk-line { height: 6px; width: 100%; }
  .sk-line.short { width: 70%; }
  .sk-line.xshort { width: 45%; }

  .sk-image {
    height: 38%;
    width: 100%;
    border-radius: 6px;
    margin-top: 2px;
  }
  .sk-btn {
    margin-top: auto;
    height: 14px;
    width: 100%;
    border-radius: 7px;
    background: linear-gradient(
      90deg,
      rgba(255, 122, 89, 0.25) 0%,
      rgba(255, 92, 141, 0.35) 50%,
      rgba(255, 122, 89, 0.25) 100%
    );
    background-size: 200% 100%;
    animation: sk-shimmer 1.6s linear infinite;
  }
  .sk-lines {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sk-chips {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .sk-chip {
    height: 12px;
    width: 32%;
    border-radius: 999px;
  }

  /* Card variants — show different skeleton layouts so the grid feels alive */
  .funnel-card.v-welcome .sk-image { height: 44%; }
  .funnel-card.v-question .sk-image { display: none; }
  .funnel-card.v-interstitial .sk-image { height: 50%; }
  .funnel-card.v-leadgen .sk-image { display: none; }
  .funnel-card.v-result .sk-image { height: 36%; }
  .funnel-card.v-plans .sk-image { display: none; }

  /* Builder sub-footer */
  .preview-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--surface);
  }
  .footer-progress {
    flex: 1;
    max-width: 340px;
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .footer-progress::after {
    content: '';
    position: absolute;
    top: 0;
    left: -30%;
    width: 30%;
    height: 100%;
    background: var(--grad);
    border-radius: 999px;
    animation: progress-slide 2s infinite ease-in-out;
  }
  @keyframes progress-slide {
    0%   { left: -30%; }
    100% { left: 100%; }
  }
  .footer-progress-label {
    font-size: 12.5px;
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .footer-actions { display: flex; gap: 8px; }

  @media (max-width: 1400px) {
    .funnel-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
  }
  @media (max-width: 1200px) {
    :root { --builder-sidebar-w: 320px; }
    .funnel-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .edit-layout { grid-template-columns: 124px minmax(0, 1fr) 280px !important; }
  }
  @media (max-width: 980px) {
    .funnel-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .edit-layout { grid-template-columns: 116px minmax(0, 1fr) 260px !important; }
  }
  @media (max-width: 860px) {
    .builder { padding: 16px; }
    .builder-sidebar {
      position: static;
      width: 100%;
      height: auto;
      max-height: 360px;
      border-right: 0;
      border-bottom: 1px solid var(--line);
      box-shadow: none;
    }
    body.is-chat-collapsed .builder-sidebar { max-height: 56px; }
    .funnel-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .edit-layout {
      grid-template-columns: 1fr !important;
      grid-auto-rows: auto;
    }
  }

  /* ============================================================
     EDIT MODE — 3-column layout (preview list | canvas | fields)
     ============================================================ */
  .edit-layout {
    display: grid;
    /* Left panel sized to comfortably fit an 85px-wide thumb (85 + side padding) */
    grid-template-columns: 132px minmax(0, 1fr) 320px;
    gap: 16px;
    padding: 16px;
    flex: 1;
    min-height: calc(100vh - var(--proto-header-h, 56px) - 48px - 70px);
  }

  .edit-side-panel {
    background: var(--surface-soft);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    align-self: stretch;
    max-height: calc(100vh - var(--proto-header-h, 56px) - 48px - 70px);
  }
  .edit-side-head {
    padding: 12px 14px;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .edit-side-count {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-dim);
    background: var(--surface-warm);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 2px 8px;
    letter-spacing: 0;
    text-transform: none;
  }

  /* Left: preview card list — actual funnel cards at ~85×150, stacked vertically */
  .edit-card-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  .edit-card-thumb {
    /* explicit dimensions so thumb reliably renders at requested size */
    width: 85px;
    height: 150px;
    flex: 0 0 150px;        /* lock height even inside flex column */
    aspect-ratio: auto;     /* override 9/16 from .funnel-card */
    box-sizing: border-box;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 7px 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    box-shadow: var(--shadow-xs);
    animation: none;        /* skip the staggered card-in to avoid invisible state */
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .edit-card-thumb:hover {
    border-color: var(--line-strong);
    background: var(--surface-warm);
    transform: translateY(-1px);
  }
  .edit-card-thumb.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.15), var(--shadow-xs);
  }
  .edit-card-thumb .thumb-num {
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 8.5px;
    font-weight: 700;
    color: var(--ink-ghost);
    letter-spacing: 0.04em;
    background: var(--surface);
    padding: 1px 4px;
    border-radius: 4px;
    line-height: 1.4;
    z-index: 2;
  }
  .edit-card-thumb.selected .thumb-num {
    color: var(--accent-ink);
    background: var(--accent-soft);
  }
  /* Compact, explicit-pixel skeleton sizes inside thumb (no % heights — they collapse) */
  .edit-card-thumb .sk-header { height: 4px; width: 50%; margin-top: 4px; }
  .edit-card-thumb .sk-title  { height: 6px; width: 80%; margin-top: 0; }
  .edit-card-thumb .sk-line   { height: 3.5px; }
  .edit-card-thumb .sk-line.short  { width: 65%; }
  .edit-card-thumb .sk-line.xshort { width: 40%; }
  .edit-card-thumb .sk-image  { height: 48px; width: 100%; border-radius: 3px; margin-top: 1px; }
  .edit-card-thumb .sk-btn    { margin-top: auto; height: 9px; border-radius: 3px; }
  .edit-card-thumb .sk-chips  { gap: 2px; }
  .edit-card-thumb .sk-chip   { height: 6px; }
  .edit-card-thumb .sk-lines  { gap: 2.5px; }
  /* The fallback "extra" lines (inline style) inside leadgen/plans → render as small input bars */
  .edit-card-thumb [style*="height:16px"],
  .edit-card-thumb [style*="height:22px"] {
    height: 8px !important;
    border-radius: 3px !important;
  }
  /* Variant-specific tweaks */
  .edit-card-thumb.v-question .sk-image,
  .edit-card-thumb.v-leadgen  .sk-image,
  .edit-card-thumb.v-plans    .sk-image { display: none; }
  .edit-card-thumb.v-interstitial .sk-image { height: 60px; }
  .edit-card-thumb.v-result       .sk-image { height: 42px; }
  .edit-card-thumb.v-welcome      .sk-image { height: 54px; }

  .edit-card-thumb .thumb-label {
    font-size: 8.5px;
    font-weight: 600;
    color: var(--ink-dim);
    text-align: center;
    line-height: 1.2;
    padding-top: 3px;
    border-top: 1px dashed var(--line);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .edit-card-thumb.selected .thumb-label { color: var(--accent-ink); }

  /* Center: full-card canvas (selected card shown in full view) */
  .edit-canvas-wrap {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px;
    overflow-y: auto;
  }
  .edit-canvas {
    width: 360px;
    max-width: 100%;
    aspect-ratio: 9 / 16;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 32px 26px 26px;
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
  }
  .canvas-eyebrow {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent-ink);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  /* Logo on canvas — small 16x16 mark, centered in the canvas "header" */
  .canvas-logo {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    background: var(--grad);
    align-self: center;            /* center horizontally in column flex */
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 1px 4px rgba(255, 107, 74, 0.45);
    flex-shrink: 0;
  }
  .canvas-logo svg { width: 10px; height: 10px; display: block; }
  .canvas-subtitle {
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin-top: -6px;
  }

  /* Image-type field in the Edit sidebar */
  .edit-field-image-preview {
    width: 100%;
    height: 92px;
    background: var(--grad-soft);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    overflow: hidden;
    position: relative;
  }
  .edit-field-image-preview.is-logo {
    height: 32px;
    background: var(--grad);
    color: #fff;
    border-color: transparent;
  }
  .edit-field-image-preview.is-logo svg { width: 14px; height: 14px; }
  .edit-field-image-preview svg { width: 28px; height: 28px; display: block; }
  .edit-field-image-preview.is-logo svg { width: 22px; height: 22px; }
  .edit-field-image-filename {
    font-size: 11px;
    color: var(--ink-dim);
    font-family: 'SF Mono', ui-monospace, monospace;
    word-break: break-all;
    line-height: 1.4;
  }
  .edit-action.edit-action-replace {
    color: var(--accent-ink);
    border-color: var(--accent-soft);
    background: var(--accent-soft);
  }
  .edit-action.edit-action-replace:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .canvas-headline {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.4px;
    line-height: 1.18;
  }
  .canvas-body {
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .canvas-image {
    height: 150px;
    background: var(--grad-soft);
    border-radius: var(--r-md);
    border: 1px solid var(--line);
  }
  .canvas-cta {
    margin-top: auto;
    padding: 12px 18px;
    background: var(--grad);
    color: #fff;
    font-weight: 600;
    border-radius: var(--r-pill);
    text-align: center;
    font-size: 14px;
    box-shadow: 0 2px 10px rgba(255, 107, 74, 0.32);
  }

  /* Right: edit fields panel */
  .edit-fields-section-label {
    padding: 12px 14px 4px;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .edit-fields-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .edit-field {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .edit-field:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.10);
  }
  .edit-field-tag {
    font-size: 9.5px;
    font-weight: 700;
    color: var(--ink-dim);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  .edit-field-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.1px;
  }
  .edit-field-name .edit-field-type {
    font-weight: 500;
    color: var(--ink-dim);
    font-size: 12.5px;
    margin-left: 2px;
  }
  .edit-field-input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    background: var(--surface-soft);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    resize: vertical;
    height: 32px;
    min-height: 32px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .edit-field-input:focus {
    /* allow content to fill the field naturally when focused */
    text-overflow: clip;
  }
  .edit-field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.14);
    background: var(--surface);
  }
  .edit-field-actions {
    display: none;        /* hidden by default */
    justify-content: space-between;
    gap: 8px;
    padding-top: 6px;
    border-top: 1px dashed var(--line);
  }
  /* Reveal actions only when the field has been edited */
  .edit-field.is-dirty .edit-field-actions {
    display: flex;
    animation: action-in 0.18s ease-out both;
  }
  @keyframes action-in {
    from { opacity: 0; transform: translateY(-2px); }
    to   { opacity: 1; transform: none; }
  }
  /* Image preview is clickable (acts as the Replace trigger) */
  .edit-field-image-preview { cursor: pointer; }
  .edit-field-image-preview:hover { filter: brightness(0.97); }
  .edit-action {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .edit-action:hover {
    background: var(--surface-warm);
    color: var(--ink);
    border-color: var(--line-strong);
  }
  .edit-action svg { width: 12px; height: 12px; }

  /* Sub-header tab indicator helpers */
  .builder-tab-count {
    margin-left: 6px;
    background: var(--surface-warm);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 1px 7px;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink-dim);
  }
  .builder-tab.active .builder-tab-count {
    background: var(--surface);
    color: var(--accent-ink);
    border-color: var(--accent-soft);
  }

  /* ============ PLANS & PRICES TAB ============ */
  .plans-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 20px;
    padding: 20px;
    flex: 1;
    min-height: calc(100vh - var(--proto-header-h, 56px) - 48px - 70px);
  }
  .plans-preview-wrap {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px 0;
  }
  .plans-phone {
    width: 320px;
    max-width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 32px;
    padding: 20px 22px 24px;
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    position: relative;
  }
  .plans-phone-notch {
    width: 100px;
    height: 6px;
    background: var(--line);
    border-radius: 4px;
    align-self: center;
    margin-bottom: 16px;
  }
  .plans-phone-logo {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1.5px dashed var(--line-strong);
    align-self: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-ghost);
    margin-bottom: 8px;
  }
  .plans-phone-logo svg { width: 14px; height: 14px; }
  .plans-phone-divider {
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
    margin-bottom: 16px;
  }
  .plans-phone-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .plans-phone-sub {
    font-size: 13px;
    color: var(--ink-dim);
    margin-bottom: 18px;
  }
  .plans-phone-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .plan-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--line);
    border-radius: 14px;
    cursor: default;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .plan-option.selected {
    border-color: var(--ink);
    border-width: 2px;
    box-shadow: var(--shadow-sm);
  }
  .plan-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--line-strong);
    flex-shrink: 0;
    position: relative;
  }
  .plan-radio.checked {
    border-color: var(--ink);
    background: var(--ink);
  }
  .plan-radio.checked::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--surface);
  }
  .plan-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }
  .plan-duration {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
  }
  .plan-old-price {
    font-size: 12px;
    color: var(--ink-ghost);
    text-decoration: line-through;
  }
  .plan-price-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1px;
  }
  .plan-price {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .plan-unit {
    font-size: 10.5px;
    color: var(--ink-dim);
  }
  .plan-billed {
    font-size: 10.5px;
    color: var(--ink-dim);
  }
  .plans-phone-badges {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 0;
  }
  .plans-phone-spacer {
    flex: 1;
    min-height: 24px;
  }
  .plans-phone-cta {
    background: var(--ink);
    color: var(--surface);
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 20px;
    border-radius: 16px;
    letter-spacing: -0.1px;
  }
  .plans-phone-legal {
    text-align: center;
    font-size: 11px;
    color: var(--ink-ghost);
    margin-top: 8px;
  }

  /* Plans sidebar */
  .plans-sidebar {
    background: var(--surface-soft);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    align-self: flex-start;
  }
  .plans-sidebar-head {
    padding: 12px 16px;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .plans-sidebar-body {
    padding: 14px 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .plans-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .plans-field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .plans-select {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    background: var(--surface);
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .plans-select svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: var(--ink-dim);
  }
  .plans-select.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: var(--surface-soft);
  }
  .plans-select.disabled .plans-select-text {
    color: var(--ink-ghost);
  }

  /* Stripe connect card */
  .plans-stripe-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 6px;
  }
  .plans-stripe-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface-warm);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-dim);
  }
  .plans-stripe-icon svg { width: 20px; height: 20px; }
  .plans-stripe-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .plans-stripe-title {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
  }
  .plans-stripe-sub {
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.5;
  }
  .plans-stripe-btn {
    align-self: flex-start;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: var(--r-sm);
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, transform 0.15s;
  }
  .plans-stripe-btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }

  @media (max-width: 980px) {
    .plans-layout, .publish-layout { grid-template-columns: 1fr; }
    .plans-sidebar { align-self: stretch; }
  }

  /* ============ REVIEW & PUBLISH TAB ============ */
  .publish-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 20px;
    padding: 20px;
    flex: 1;
    min-height: calc(100vh - var(--proto-header-h, 56px) - 48px - 70px);
  }
  .publish-phone-illustration {
    background: var(--surface-soft);
    border: 1.5px dashed var(--line-strong);
    border-radius: 18px;
    padding: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .publish-phone-icon {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
  }
  .publish-phone-icon svg { width: 64px; height: 64px; }
  .publish-phone-subtitle {
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .publish-phone-steps {
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0;
    margin: 0 0 8px;
  }
  .publish-phone-steps li {
    counter-increment: step;
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    padding-left: 24px;
    position: relative;
  }
  .publish-phone-steps li::before {
    content: counter(step) ".";
    position: absolute;
    left: 0;
    font-weight: 700;
    color: var(--ink);
  }
  .publish-phone-steps li strong {
    font-weight: 700;
    color: var(--ink);
  }

  /* Publish sidebar fields */
  .publish-url-field {
    display: flex;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .publish-url-field:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.12);
  }
  .publish-url-prefix {
    padding: 8px 2px 8px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-dim);
    white-space: nowrap;
    background: var(--surface-soft);
    border-right: 1px solid var(--line);
    user-select: none;
  }
  .publish-url-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'SF Mono', ui-monospace, monospace;
    color: var(--ink);
    min-width: 0;
  }
  .publish-field-hint {
    font-size: 11px;
    color: var(--ink-ghost);
    margin-top: -2px;
  }
  .publish-input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    background: var(--surface);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .publish-input::placeholder { color: var(--ink-ghost); }
  .publish-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.12);
  }
  .publish-required {
    color: var(--danger);
    font-weight: 700;
    font-size: 11px;
  }
  .publish-optional {
    font-weight: 500;
    color: var(--ink-ghost);
    font-size: 11px;
    margin-left: 2px;
  }
  .publish-divider {
    height: 1px;
    background: var(--line);
    margin: 2px 0;
  }

  /* Checkbox */
  .publish-confirm {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 4px 0;
  }
  .publish-checkbox {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }
  .publish-checkmark {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    border: 1.5px solid var(--line-strong);
    border-radius: 5px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    margin-top: 1px;
    position: relative;
  }
  .publish-checkbox:checked + .publish-checkmark {
    background: var(--accent);
    border-color: var(--accent);
  }
  .publish-checkbox:checked + .publish-checkmark::after {
    content: '';
    display: block;
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    margin-top: -2px;
  }
  .publish-confirm-text {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* Publish CTA */
  .publish-cta {
    width: 100%;
    padding: 12px 20px;
    border: none;
    border-radius: var(--r-sm);
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    transition: background 0.18s, transform 0.15s, opacity 0.15s;
    background: var(--ink);
    color: var(--surface);
  }
  .publish-cta:hover:not(.disabled) {
    background: var(--accent);
    transform: translateY(-1px);
  }
  .publish-cta.disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* "More" toggle for optional fields */
  .publish-more-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    padding: 4px 0;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    transition: color 0.15s;
  }
  .publish-more-toggle:hover { color: var(--accent-hover); }
  .publish-more-chevron {
    width: 14px;
    height: 14px;
    transition: transform 0.2s;
  }
  .publish-more-toggle.is-open .publish-more-chevron {
    transform: rotate(180deg);
  }
  .publish-more-fields {
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: more-in 0.2s ease-out both;
  }
  @keyframes more-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: none; }
  }

  /* Adapty integration block */
  .publish-block {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .publish-block-warning {
    background: var(--warning-bg);
    border: 1px solid color-mix(in srgb, var(--warning) 30%, transparent);
    border-radius: var(--r-md);
    padding: 14px 16px;
  }
  .publish-block-head {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
