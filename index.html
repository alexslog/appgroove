  .publish-block-warn-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    color: var(--warning);
    margin-top: 1px;
  }
  .publish-block-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.4;
  }
  .publish-block-warning .publish-block-title {
    color: var(--warning);
    flex: 1;
  }
  .publish-block-close {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--warning);
    opacity: 0.6;
    padding: 0;
    transition: opacity 0.15s, background 0.15s;
  }
  .publish-block-close:hover {
    opacity: 1;
    background: color-mix(in srgb, var(--warning) 12%, transparent);
  }
  .publish-block-close svg { width: 13px; height: 13px; }
  .publish-block-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .publish-integration-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .publish-integration-card:hover {
    border-color: var(--line-strong);
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }
  .publish-integration-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    border-radius: 9px;
    background: var(--surface-warm);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-dim);
  }
  .publish-integration-icon svg { width: 18px; height: 18px; }
  .publish-integration-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .publish-integration-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
  }
  .publish-integration-desc {
    font-size: 11.5px;
    color: var(--ink-dim);
    line-height: 1.45;
  }
  .publish-integration-arrow {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: var(--ink-ghost);
    transition: color 0.15s, transform 0.15s;
  }
  .publish-integration-card:hover .publish-integration-arrow {
    color: var(--accent);
    transform: translateX(2px);
  }

  /* ============ DETAIL PAGE ============ */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px 7px 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-pill); font-size: 13px; font-weight: 600;
    color: var(--ink-soft); cursor: pointer; font-family: inherit;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    margin-bottom: 20px;
  }
  .back-btn:hover { background: var(--surface-warm); border-color: var(--line-strong); color: var(--ink); }
  .back-btn svg { width: 14px; height: 14px; }

  .detail-block {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 22px 24px;
    box-shadow: var(--shadow-xs); margin-bottom: 16px;
  }
  .detail-block-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .detail-block-title {
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.6px;
  }

  /* Info block */
  .detail-info {
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .detail-info-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .detail-type-icon {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .detail-type-icon svg { width: 20px; height: 20px; }
  .detail-type-icon.type-web      { background:#E6F0FF; color:#2F6BFF; }
  .detail-type-icon.type-web2app  { background:#F0EBFF; color:#6B4EDD; }
  .detail-type-icon.type-inapp    { background:#E4F5EE; color:#0A9B6B; }
  .detail-type-icon.type-experiment { background:#FFEEDB; color:#B5520C; }

  .detail-info-name {
    font-size: 20px; font-weight: 700; letter-spacing: -0.4px; color: var(--ink);
    line-height: 1.1;
  }
  .detail-info-name-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .detail-info-meta {
    display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-dim); flex-wrap: wrap;
  }
  .detail-info-sep { color: var(--ink-ghost); }
  .detail-info-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .detail-icon-btn {
    width: 34px; height: 34px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--surface);
    color: var(--ink-soft); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s; flex-shrink: 0;
  }
  .detail-icon-btn:hover { background: var(--surface-warm); border-color: var(--line-strong); color: var(--ink); }
  .detail-icon-btn svg { width: 15px; height: 15px; }

  .detail-action-btn {
    padding: 7px 14px; background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-pill); font-size: 13px; font-weight: 600; color: var(--ink);
    cursor: pointer; font-family: inherit; transition: background 0.15s, border-color 0.15s; white-space: nowrap;
  }
  .detail-action-btn:hover { background: var(--surface-warm); border-color: var(--line-strong); }

  /* Detail metric cards */
  .dmetric-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 16px;
  }
  @media (max-width: 860px) { .dmetric-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 540px)  { .dmetric-grid { grid-template-columns: repeat(2, 1fr); } }

  .dmetric-card {
    background: var(--surface-soft); border: 1.5px solid var(--line);
    border-radius: var(--r-md); padding: 12px 14px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .dmetric-card:hover { border-color: var(--line-strong); background: var(--surface-warm); }
  .dmetric-card.selected {
    border-color: var(--accent); background: var(--accent-soft);
    box-shadow: 0 0 0 3px rgba(255,107,74,0.10);
  }
  .dmetric-label {
    font-size: 10.5px; font-weight: 600; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px;
  }
  .dmetric-card.selected .dmetric-label { color: var(--accent-ink); }
  .dmetric-value { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; line-height: 1; }
  .dmetric-card.selected .dmetric-value { color: var(--accent-ink); }

  /* Experiment-mode metric cards: total + per-variant rows */
  .dmetric-grid.dmetric-grid-exp { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 760px) { .dmetric-grid.dmetric-grid-exp { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .dmetric-grid.dmetric-grid-exp { grid-template-columns: 1fr; } }

  .dmetric-card.dmetric-card-exp { padding: 12px 14px 10px; }
  .dmetric-card-exp .dmetric-total-row {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
  }
  .dmetric-card-exp .dmetric-total-lbl {
    font-size: 10.5px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
  }
  .dmetric-card.selected.dmetric-card-exp .dmetric-total-lbl { color: var(--accent-ink); }

  .exp-mvar {
    display: flex; flex-direction: column; gap: 4px;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--line);
  }
  .exp-mvar-row {
    display: grid;
    grid-template-columns: 9px minmax(0, 1fr) auto;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .exp-mvar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .exp-mvar-name {
    color: var(--ink-soft); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .exp-mvar-trophy { font-size: 12px; line-height: 1; }
  .exp-mvar-lift {
    font-size: 12px; font-weight: 700;
    text-align: right; min-width: 48px;
    font-variant-numeric: tabular-nums;
  }
  .exp-mvar-lift.up   { color: var(--success); }
  .exp-mvar-lift.down { color: var(--danger); }
  .exp-mvar-lift.flat { color: var(--ink-dim); }
  .dmetric-card.selected .exp-mvar { border-top-color: var(--accent-soft); }

  /* Chart containers */
  .chart-wrap {
    background: var(--surface-soft); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 12px 8px 6px; overflow: hidden;
  }
  .chart-wrap.chart-wrap-flat {
    background: transparent; border: none;
    border-radius: 0; padding: 8px 0 0;
  }
  .chart-empty {
    display: flex; align-items: center; justify-content: center;
    height: 160px; color: var(--ink-ghost); font-size: 13px;
  }

  /* Experiments table */
  .badge-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--surface-warm); border: 1px solid var(--line);
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
  }
  .pill-running { background: #EBF2FF; color: #2F5FCC; }
  .pill-running::before { background: #2F5FCC; }
  .pill-stopped { background: var(--danger-bg); color: var(--danger); }
  .pill-stopped::before { background: var(--danger); }
  .exp-ctrl-funnel { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }

  /* Compact pills inside table cells (variants / conditions) */
  .cell-pills { display: flex; flex-wrap: wrap; gap: 4px; max-width: 220px; }
  /* Variant pills under the experiment name need room for 3 pills on one row */
  .name-wrap .cell-pills { max-width: none; }
  /* Name column in the Experiments table — fixed 260px width */
  #section-experiments table th:first-child,
  #section-experiments table td:first-child { width: 260px; max-width: 260px; min-width: 260px; }
  /* Status column (now col 4 after Conditions removed) */
  #section-experiments table th:nth-child(4),
  #section-experiments table td:nth-child(4) { width: 1%; white-space: nowrap; }
  /* Variants column (now col 3) — fit all 3 pills on a single row */
  #section-experiments table th:nth-child(3),
  #section-experiments table td:nth-child(3) { width: 1%; }
  #section-experiments table td:nth-child(3) .cell-pills {
    flex-direction: row;
    flex-wrap: nowrap;
    gap: 4px;
    max-width: none;
    min-width: 0;
  }

  /* Funnels table — Name column fixed 260px; narrow columns shrink to content */
  #section-table table th:first-child,
  #section-table table td:first-child { width: 260px; max-width: 260px; min-width: 260px; }
  #section-table table th:nth-child(3),  /* Visitors */
  #section-table table td:nth-child(3) { width: 1%; white-space: nowrap; }
  #section-table table th:nth-child(4),  /* Conversion */
  #section-table table td:nth-child(4),
  #section-table table th:nth-child(5),  /* Status */
  #section-table table td:nth-child(5) { width: 1%; white-space: nowrap; }

  /* URL column — flush against the Name column (no left gap), short URL + icons */
  table th.url-col,
  table td.url-col {
    width: 1%; white-space: nowrap;
    padding-left: 0; padding-right: 8px;
  }
  td.url-col { vertical-align: middle; }
  td.url-col .link-cell { margin-right: 8px; vertical-align: middle; font-size: 13px; }
  /* Pull the Name column's right padding back so the URL icons sit immediately after the name */
  #section-table table th:first-child,
  #section-table table td:first-child,
  #section-experiments table th:first-child,
  #section-experiments table td:first-child { padding-right: 0; }
  td.url-col .row-icon-btn + .row-icon-btn { margin-left: 2px; }

  /* Inline icon buttons in row action cell (copy link + open in browser + ⋯) */
  td.center { text-align: right; padding-right: 12px; white-space: nowrap; }
  thead th.center { text-align: right; padding-right: 12px; width: 1%; }
  .row-icon-btn {
    width: 28px; height: 28px;
    padding: 0;
    border-radius: 8px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-dim);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    vertical-align: middle;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .row-icon-btn:hover {
    background: var(--surface-warm);
    color: var(--ink);
    border-color: var(--line);
  }
  .row-icon-btn svg { width: 14px; height: 14px; }
  .row-icon-btn + .row-icon-btn { margin-left: 2px; }
  .row-icon-btn + .more-menu-wrap { margin-left: 2px; }
  /* Hide row icons by default, reveal on row hover */
  tbody tr .row-icon-btn {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  tbody tr:hover .row-icon-btn,
  tbody tr:focus-within .row-icon-btn {
    opacity: 1;
    pointer-events: auto;
  }
  /* Align the "NAME" header with the first letter of the funnel/experiment name
     (offset = type-icon-sm width 22px + name-wrap gap 10px = 32px) */
  .table-card table thead th:first-child { padding-left: calc(16px + 32px); }
  .cell-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface-warm); border: 1px solid var(--line);
    padding: 2px 8px; border-radius: 999px;
    font-size: 11.5px; font-weight: 500; color: var(--ink-soft);
    white-space: nowrap; max-width: 140px;
    overflow: hidden; text-overflow: ellipsis;
    line-height: 1.5;
  }
  .cell-pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cell-pill-num {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 14px; height: 14px; padding: 0 3px;
    border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    font-size: 9.5px; font-weight: 700; color: var(--ink-dim);
    flex-shrink: 0;
  }
  .cell-pill-more {
    background: transparent;
    border: 1px dashed var(--line);
    color: var(--ink-dim); font-weight: 600;
    cursor: default;
  }

  /* Condition badges — field / op / value (used in home table + detail page) */
  .cond-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-warm); border: 1px solid var(--line);
    padding: 3px 9px; border-radius: 999px;
    font-size: 11.5px; line-height: 1.5;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .cond-badge-field, .cond-badge-value {
    color: var(--ink); font-weight: 600;
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: 11px;
  }
  .cond-badge-op { color: var(--ink-dim); font-size: 11px; }

  /* Collapse condition pills inside table cells — show only the field, expand on hover */
  .cell-pills .cond-badge .cond-badge-op,
  .cell-pills .cond-badge .cond-badge-value { display: none; }
  .cell-pills .cond-badge { cursor: default; }
  .cell-pills .cond-badge:hover { background: var(--surface); border-color: var(--ink-dim); }
  .cell-pills .cond-badge:hover .cond-badge-op,
  .cell-pills .cond-badge:hover .cond-badge-value { display: inline; }

  /* Experiment detail – variants & conditions */
  .exp-detail-2col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  @media (max-width: 660px) { .exp-detail-2col { grid-template-columns: 1fr; } }

  .exp-detail-sub-title {
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px;
  }
  .variant-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .var-card {
    background: var(--surface-soft); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 16px;
  }
  .var-card.is-winner { border-color: var(--success); }
  .var-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .var-name  { font-size: 13px; font-weight: 700; color: var(--ink); }
  .var-label { font-size: 12px; color: var(--ink-dim); margin-top: 1px; }
  .var-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: var(--r-pill); border: 1px solid; white-space: nowrap; }
  .var-badge.winner     { background: var(--success-bg); color: var(--success);    border-color: var(--success); }
  .var-badge.control    { background: var(--surface-warm); color: var(--ink-dim); border-color: var(--line); }
  .var-badge.challenger { background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent-soft); }

  .var-split-row {
    display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-dim); margin-bottom: 4px;
  }
  .var-split-track { height: 5px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
  .var-split-fill  { height: 100%; border-radius: 999px; background: var(--accent); }

  .var-stats { display: flex; gap: 16px; }
  .var-stat  { font-size: 12px; color: var(--ink-dim); }
  .var-stat strong { font-size: 15px; font-weight: 700; color: var(--ink); display: block; line-height: 1.2; }

  .cond-list { display: flex; flex-direction: column; }
  .cond-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--line);
  }
  .cond-item:last-child { border-bottom: none; }
  .cond-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface-warm); border: 1px solid var(--line);
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  }
  .cond-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .cond-rule { font-size: 12px; color: var(--ink-dim); margin-top: 2px; font-family: 'SF Mono', ui-monospace, monospace; }

  .split-rules-box {
    background: var(--surface-warm); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 12px 14px; margin-top: 16px;
    display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft);
  }
  .split-rules-icon { font-size: 15px; }
  .split-rules-text strong { color: var(--ink); }

  /* ============================================================
     EXPERIMENT SETUP v3 — cards, no table (compact)
     ============================================================ */
  .exp-setup-v2 { display: flex; flex-direction: column; gap: 12px; }

  .exp-variants-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 10px;
  }
  .exp-vcard {
    position: relative;
    background: var(--surface-soft);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .exp-vcard.is-leading {
    border-color: var(--success);
    background: linear-gradient(180deg, var(--success-bg) 0%, var(--surface-soft) 75%);
  }
  .exp-vcard-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .exp-vcard-id { display: flex; align-items: flex-start; gap: 7px; min-width: 0; }
  .exp-vdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .exp-vname { font-size: 12.5px; font-weight: 700; color: var(--ink); line-height: 1.2; }
  .exp-vlabel { font-size: 11.5px; color: var(--ink-dim); margin-top: 1px; }
  .exp-vstats {
    display: flex; gap: 14px; flex-wrap: wrap;
    padding-top: 6px; border-top: 1px dashed var(--line);
  }
  .exp-vstat-num { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.1; letter-spacing: -0.2px; }
  .exp-vstat-lbl { font-size: 9.5px; color: var(--ink-dim); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; }

  .exp-vsplit-row {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 6px; border-top: 1px dashed var(--line);
    font-size: 11.5px;
  }
  .exp-vsplit-lbl { color: var(--ink-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; font-size: 10px; }
  .exp-vsplit-num { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -0.2px; }

  /* Experiment setup — full-width single block, 2-column inner layout */
  .exp-setup-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 28px;
  }
  @media (max-width: 820px) {
    .exp-setup-grid { grid-template-columns: 1fr; gap: 20px; }
  }
  .exp-setup-col { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .exp-setup-col-divider {
    border-left: 1px dashed var(--line);
    padding-left: 28px;
  }
  @media (max-width: 820px) {
    .exp-setup-col-divider { border-left: none; padding-left: 0; padding-top: 18px; border-top: 1px dashed var(--line); }
  }

  /* Variant pills shown in the Setup block (vertical stack, aligned columns) */
  .exp-variants-pills { display: flex; flex-direction: column; gap: 8px; }
  .exp-var-pill {
    display: grid;
    grid-template-columns: 12px 92px minmax(0, 1fr) 52px;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    background: var(--surface-soft);
    font-size: 13px; color: var(--ink);
    width: 100%; min-width: 0;
  }
  .exp-var-pill-dot { width: 10px; height: 10px; border-radius: 50%; }
  .exp-var-pill-name { font-weight: 700; color: var(--ink); }
  .exp-var-pill-funnel {
    color: var(--ink-dim); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }
  .exp-var-pill-pct {
    font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums;
    padding-left: 12px; border-left: 1px solid var(--line); text-align: left;
  }

  /* Horizontal divider between Goal and Variants */
  .exp-sub-divider {
    border: none; border-top: 1px dashed var(--line);
    margin: 0;
  }

  /* Per-variant filter chips above Performance */
  .perf-filter-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center;
    margin-bottom: 14px;
  }
  .perf-filter-datepicker { margin-left: auto; }
  .perf-filter-chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--r-pill);
    padding: 7px 14px;
    font-size: 13px; font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    font-family: inherit;
    max-width: 100%;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .perf-filter-chip:hover { border-color: var(--ink-dim); }
  .perf-filter-chip.is-active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent-ink);
  }
  .perf-filter-chip-dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  }
  .perf-filter-chip-trophy { font-size: 12px; line-height: 1; }
  .perf-filter-chip-sub { color: var(--ink-dim); font-weight: 500; }
  .perf-filter-chip.is-active .perf-filter-chip-sub { color: var(--accent-ink); }

  /* Split-bar segments now show variant name + % */
  .exp-split-seg-name { font-weight: 600; opacity: 0.92; margin-right: 5px; font-size: 11px; }

  .exp-sub-section {
    padding-bottom: 16px; margin-bottom: 16px;
    border-bottom: 1px dashed var(--line);
  }
  .exp-sub-section:last-child {
    padding-bottom: 0; margin-bottom: 0; border-bottom: none;
  }
  .exp-sub-section-title {
    font-size: 10.5px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .exp-sub-section-title-icon { color: var(--accent); font-size: 12px; }

  /* Clean goal statement — title + subtitle */
  .exp-goal-statement {
    display: flex; align-items: center; gap: 12px;
    padding-left: 2px;
  }
  .exp-goal-statement-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .exp-goal-title { font-size: 15px; color: var(--ink); font-weight: 700; line-height: 1.2; }
  .exp-goal-sub   { font-size: 12.5px; color: var(--ink-dim); margin-top: 3px; line-height: 1.4; }

  .variants-list { display: flex; flex-direction: column; gap: 8px; }
  .variant-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface-soft);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .variant-row:hover { border-color: var(--ink-dim); }
  .variant-row:hover .variant-row-chevron { color: var(--ink); transform: translateX(2px); }
  .variant-row.is-leading {
    border-color: var(--success);
    background: linear-gradient(180deg, var(--success-bg) 0%, var(--surface-soft) 80%);
  }
  .variant-row.is-leading:hover { border-color: var(--success); }
  .variant-row-funnel {
    font-size: 13px; color: var(--ink); font-weight: 600;
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .variant-row-emoji { font-size: 16px; flex-shrink: 0; }
  .variant-row-chevron {
    color: var(--ink-dim); flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px;
    transition: color 0.15s, transform 0.15s;
  }
  .variant-row .var-badge { flex-shrink: 0; }

  /* Experiment goal & comments block */
  .exp-goal-text {
    font-size: 14px; color: var(--ink); line-height: 1.5;
    background: var(--surface-soft);
    border-left: 3px solid var(--accent);
    padding: 12px 14px; border-radius: var(--r-md);
  }
  .exp-comments-section { margin-top: 14px; }
  .exp-comments-title {
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.6px;
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
  }
  .exp-comments-list { display: flex; flex-direction: column; }
  .exp-comment-item {
    display: flex; gap: 10px;
    padding: 10px 0; border-top: 1px solid var(--line);
  }
  .exp-comment-item:first-child { border-top: none; padding-top: 4px; }
  .exp-comment-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .exp-comment-body { flex: 1; min-width: 0; }
  .exp-comment-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-dim); margin-bottom: 3px;
  }
  .exp-comment-meta strong { color: var(--ink-soft); font-weight: 700; font-size: 13px; }
  .exp-comment-text { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
  .exp-comment-input {
    margin-top: 10px; padding-top: 10px;
    display: flex; gap: 8px; align-items: flex-start;
    border-top: 1px solid var(--line);
  }
  .exp-comment-input textarea {
    flex: 1; resize: none; min-height: 36px;
    padding: 8px 12px; border: 1px solid var(--line);
    border-radius: var(--r-md); font-family: inherit; font-size: 13px;
    background: var(--surface); color: var(--ink);
  }
  .exp-comment-input button {
    padding: 8px 14px; border: none;
    background: var(--accent); color: white;
    border-radius: var(--r-md); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }

  /* Versions block — winning version callout */
  .exp-winner-callout {
    display: flex; align-items: center; gap: 8px;
    background: var(--success-bg); border: 1px solid var(--success);
    border-radius: var(--r-md);
    padding: 8px 12px;
    font-size: 13px; color: var(--success);
    margin-bottom: 14px;
  }
  .exp-winner-callout strong { color: var(--ink); font-weight: 700; }
  .exp-winner-callout-name { color: var(--success); font-weight: 700; }

  /* Split visualization — single row, % labels inside the segments */
  .exp-split-section {
    display: flex; flex-direction: column; gap: 10px;
  }
  .exp-split-meta { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-dim); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .exp-split-meta strong { color: var(--ink-soft); font-weight: 700; }
  .exp-split-bar {
    display: flex; height: 24px; border-radius: 999px; overflow: hidden;
    background: var(--surface-warm); border: 1px solid var(--line);
    width: 100%;
  }
  .exp-split-seg {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 700; color: #fff;
    letter-spacing: -0.2px;
    text-shadow: 0 1px 1px rgba(0,0,0,0.18);
    overflow: hidden;
    min-width: 0;
  }
  .exp-split-seg + .exp-split-seg { border-left: 1px solid var(--surface); }

  /* Conditions builder — compact, AND inline */
  .exp-cond-section { display: flex; flex-direction: column; gap: 8px; }
  .exp-cond-title {
    font-size: 10.5px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.6px;
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 2px;
  }
  .exp-cond-title-icon { color: var(--accent); font-size: 12px; }
  .exp-cond-rows { display: flex; flex-direction: column; gap: 8px; }
  .exp-cond-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .exp-cond-row-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface-warm); border: 1px solid var(--line);
    font-size: 11.5px; font-weight: 700; color: var(--ink-dim);
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  /* Bigger Conditions badges (scoped to detail page conditions list) */
  .exp-cond-rows .cond-badge {
    font-size: 14px; padding: 7px 14px; gap: 8px;
  }
  .exp-cond-rows .cond-badge-field {
    font-size: 13.5px; font-weight: 600; color: var(--ink-soft);
  }
  .exp-cond-rows .cond-badge-op {
    font-size: 13px; color: var(--ink-dim); font-weight: 500;
  }
  /* Highlight values — stronger ink + tinted backdrop */
  .exp-cond-rows .cond-badge-value {
    font-size: 13.5px; font-weight: 800; color: var(--accent-ink);
    background: var(--accent-soft);
    padding: 1px 7px; border-radius: 6px;
    margin-left: 1px;
  }

  .exp-cond-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-warm); border: 1px solid var(--line);
    padding: 4px 8px; border-radius: var(--r-md);
    font-size: 11.5px; color: var(--ink-soft);
  }
  .exp-cond-pill strong { color: var(--ink); font-weight: 700; }
  .exp-cond-pill code { font-family: 'SF Mono', ui-monospace, monospace; color: var(--ink); font-size: 11px; background: transparent; }
  .exp-cond-pill-lbl { color: var(--ink-dim); font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .exp-cond-pill-op { font-family: 'SF Mono', ui-monospace, monospace; color: var(--ink-dim); font-size: 11px; }
  .exp-cond-and {
    display: inline-flex; align-items: center;
    font-size: 10px; font-weight: 700; color: var(--accent-ink);
    background: var(--accent-soft); padding: 3px 8px; border-radius: 999px;
    letter-spacing: 0.5px; flex-shrink: 0;
  }

  /* Chart legend (line + step charts) */
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    margin-bottom: 10px; padding-left: 4px;
    font-size: 12px; color: var(--ink-soft);
  }
  .chart-legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .chart-legend-swatch { width: 14px; height: 3px; border-radius: 2px; }
  .chart-legend-bar-swatch { width: 11px; height: 11px; border-radius: 2px; }
  .chart-legend-name { color: var(--ink); font-weight: 600; }

  /* Make snapshot metric-cards feel clickable */
  .metric-card.is-clickable { cursor: pointer; }
  .metric-card.is-clickable:hover { border-color: var(--accent-soft); }

  /* ============================================================
     ANALYTICS PAGE
     ============================================================ */
  .analytics-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 760px) {
    .analytics-layout { grid-template-columns: 1fr; }
  }

  .analytics-side {
    position: sticky; top: 16px;
    align-self: start;
    display: flex; flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-xs);
    padding: 8px 14px 12px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  .analytics-side-title {
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 12px 4px 10px;
  }
  .analytics-nav { display: flex; flex-direction: column; }
  .analytics-nav-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 4px; font-size: 14px; color: var(--ink-soft);
    border-bottom: 1px solid var(--line);
    border-left: none; border-right: none; border-top: none;
    background: transparent;
    cursor: pointer; transition: color 0.15s;
    text-align: left; width: 100%;
    font-family: inherit; text-decoration: underline;
    text-decoration-color: transparent; text-underline-offset: 4px;
  }
  .analytics-nav-item:last-child { border-bottom: none; }
  .analytics-nav-item:hover { color: var(--ink); text-decoration-color: var(--ink-dim); }
  .analytics-nav-item.active {
    color: var(--ink); font-weight: 700;
    text-decoration-color: var(--ink);
  }
  .analytics-nav-item.active .analytics-nav-arrow { color: var(--accent); opacity: 1; }
  .analytics-nav-arrow { color: var(--ink-dim); opacity: 0; font-size: 14px; transition: opacity 0.15s; }
  .analytics-nav-item:hover .analytics-nav-arrow { opacity: .6; }

  .analytics-main { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

  .analytics-toolbar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .analytics-toolbar-right {
    display: inline-flex; align-items: center; gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 7px 12px;
    font-size: 12.5px; font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .filter-chip:hover { border-color: var(--ink-dim); }
  .filter-chip.is-active { border-color: var(--accent); color: var(--accent-ink); background: var(--accent-soft); }
  .filter-chip .filter-chip-lbl { color: var(--ink-dim); font-weight: 600; }
  .filter-chip.is-active .filter-chip-lbl { color: var(--accent-ink); }
  .filter-chip .caret { font-size: 10px; opacity: 0.7; }
  .filter-chip-add {
    border-style: dashed; color: var(--ink-dim);
  }
  .filter-chip-active {
    border-color: var(--accent);
    color: var(--accent-ink);
    background: var(--accent-soft);
  }
  .filter-chip-x {
    color: var(--accent-ink);
    cursor: pointer;
    margin-left: 4px;
    font-size: 14px;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .filter-chip-x:hover { opacity: 1; }

  .filter-popover-add {
    min-width: 280px; max-width: 320px;
    padding: 4px;
    left: auto; right: 0;
  }
  .filter-section { border-bottom: 1px solid var(--line); }
  .filter-section:last-child { border-bottom: none; }
  .filter-section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 10px; cursor: pointer; border-radius: 8px;
    font-size: 13px; font-weight: 600; color: var(--ink-soft);
    gap: 8px;
  }
  .filter-section-head:hover { background: var(--surface-warm); color: var(--ink); }
  .filter-section-head .fs-right { display: inline-flex; align-items: center; gap: 8px; }
  .filter-section-head .fs-value {
    font-size: 12px; color: var(--ink-dim); font-weight: 500;
    max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .filter-section.is-active .filter-section-head .fs-value { color: var(--accent-ink); font-weight: 600; }
  .filter-section-head .caret { font-size: 10px; transition: transform 0.15s; opacity: 0.6; }
  .filter-section.is-open .filter-section-head .caret { transform: rotate(180deg); }
  .filter-section-body { display: none; padding: 2px 4px 8px; }
  .filter-section.is-open .filter-section-body { display: block; }

  .filter-popover {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    min-width: 200px; max-width: 240px;
    padding: 6px;
    display: none;
    z-index: 50;
    text-align: left;
  }
  .filter-chip.is-open .filter-popover { display: block; }
  .filter-popover .item {
    padding: 7px 10px; font-size: 13px; color: var(--ink-soft);
    border-radius: 8px; cursor: pointer; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .filter-popover .item:hover { background: var(--surface-warm); color: var(--ink); }
  .filter-popover .item.active { color: var(--accent-ink); background: var(--accent-soft); }
  .filter-popover .item .check { width: 12px; opacity: 0; color: var(--accent); font-weight: 700; flex-shrink: 0; }
  .filter-popover .item.active .check { opacity: 1; }

  .metric-card-large {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px 22px 22px;
    box-shadow: var(--shadow-xs);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .metric-card-large.is-focused {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .mcl-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .mcl-head-left { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .mcl-name {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; color: var(--ink-soft);
  }
  .mcl-row { display: flex; align-items: center; gap: 12px; }
  .mcl-value {
    font-size: 30px; font-weight: 700; color: var(--ink);
    letter-spacing: -0.6px; line-height: 1;
  }
  .mcl-delta {
    font-size: 12px; font-weight: 600;
    padding: 3px 9px; border-radius: var(--r-pill);
  }
  .mcl-delta.up { background: var(--success-bg); color: var(--success); }
  .mcl-delta.down { background: var(--danger-bg); color: var(--danger); }
  .mcl-delta.flat { background: var(--surface-warm); color: var(--ink-dim); }

  .mcl-head-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .mcl-legend { display: inline-flex; align-items: center; gap: 14px; font-size: 12px; color: var(--ink-soft); flex-wrap: wrap; }
  .mcl-legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .mcl-legend-swatch { width: 16px; height: 3px; border-radius: 2px; background: var(--accent); }
  .mcl-legend-swatch.dashed { background: transparent; border-top: 2px dashed var(--ink-dim); height: 0; }
  .mcl-chart-type {
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid var(--line); border-radius: var(--r-pill);
    padding: 5px 10px; font-size: 12px; color: var(--ink-soft);
    background: var(--surface);
    cursor: pointer;
    font-family: inherit;
  }
  .mcl-chart-type:hover { border-color: var(--ink-dim); }
  .mcl-chart { margin-top: 16px; }
  .mcl-chart svg { display: block; }

  .analytics-info-block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px 22px;
    box-shadow: var(--shadow-xs);
    display: flex; align-items: center; gap: 14px;
  }
  .analytics-info-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--accent-soft); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .analytics-info-name { font-size: 18px; font-weight: 700; color: var(--ink); }
  .analytics-info-sub { font-size: 13px; color: var(--ink-dim); margin-top: 2px; }

/* ============================================================
   .home-ref — scoped overrides to match the reference design
   ============================================================ */
body:has(.home-ref) {
  background:
    radial-gradient(circle at center, #D8D8D8 0.9px, transparent 1.2px) 0 0 / 18px 18px,
    #F3F3F3;
}
body:has(.home-ref) .proto-header {
  background: rgba(243, 243, 243, 0.85);
  backdrop-filter: saturate(140%) blur(8px);
  border-bottom: 1px solid #E6E6E6;
}

.home-ref {
  --rf-ink: #111;
  --rf-ink-soft: #5A5A5A;
  --rf-ink-muted: #8C8C8C;
  --rf-surface: #FFFFFF;
  --rf-border: #ECECEC;
  --rf-border-strong: #E2E2E2;
  --rf-green-bg: #E4F6EC;
  --rf-green-ink: #1A8649;
  --rf-red-bg:   #FDECEC;
  --rf-red-ink:  #C7332D;
  --rf-yellow-bg:#FFF3D6;
  --rf-yellow-ink:#9A6700;
  --rf-orange-bg:#FFF2DF;
  --rf-orange-ink:#B86A18;
  --rf-orange-border:#F2C99A;
  --rf-radius: 14px;

  display: flex;
  flex-direction: column;
  gap: 36px;
  color: var(--rf-ink);
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
}

.home-ref > section { order: 5; margin: 0; }
.home-ref > section:first-of-type { order: 1; }
.home-ref > #section-experiments { order: 2; }
.home-ref > #section-table { order: 3; }

/* Section header */
.home-ref .section-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.home-ref .sec-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--rf-ink);
  background: none;
  -webkit-text-fill-color: initial;
}
.home-ref .sec-title-centered {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.home-ref .sec-sub { color: var(--rf-ink-muted); font-weight: 500; }

/* Date / status filter pill */
.home-ref .date-picker {
  background: var(--rf-surface);
  border: 1px solid var(--rf-border);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--rf-ink-soft);
  box-shadow: 0 1px 1px rgba(0,0,0,0.02);
}
.home-ref .date-picker svg { color: var(--rf-ink-muted); }
.home-ref .date-picker .caret { color: var(--rf-ink-muted); }

/* Metric cards */
.home-ref .metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
}
@media (max-width: 1000px) { .home-ref .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 560px)  { .home-ref .metrics-grid { grid-template-columns: 1fr; } }

.home-ref .metric-card {
  background: var(--rf-surface);
  border: 1px solid var(--rf-border);
  border-radius: var(--rf-radius);
  padding: 16px 18px;
  box-shadow: none;
  transition: border-color .15s ease, transform .15s ease;
}
.home-ref .metric-card:hover { border-color: var(--rf-border-strong); transform: none; }

.home-ref .metric-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--rf-ink-soft);
  margin-bottom: 10px;
  background: none;
  -webkit-text-fill-color: initial;
}
.home-ref .metric-label .m-ico {
  display: inline-flex;
  width: 18px;
  height: 18px;
  color: var(--rf-ink-muted);
}
.home-ref .metric-label .m-ico svg { width: 100%; height: 100%; }

.home-ref .metric-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.home-ref .metric-value {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--rf-ink);
}
.home-ref .delta {
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  white-space: nowrap;
}
.home-ref .delta.up   { background: var(--rf-green-bg); color: var(--rf-green-ink); }
.home-ref .delta.down { background: var(--rf-red-bg);   color: var(--rf-red-ink); }
.home-ref .delta.flat { background: #F0F0F0;            color: var(--rf-ink-muted); }

/* Tables */
.home-ref .table-card {
  background: var(--rf-surface);
  border: 1px solid var(--rf-border);
  border-radius: var(--rf-radius);
  overflow: hidden;
  box-shadow: none;
}
.home-ref .table-card table { width: 100%; border-collapse: collapse; }
.home-ref .table-card thead th {
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.06em;
  font-weight: 600;
  color: var(--rf-ink-muted);
  background: transparent;
  padding: 14px 18px;
  text-align: left;
  border-bottom: 1px solid var(--rf-border);
}
.home-ref .table-card thead th:first-child::after {
  content: " ↑";
  color: var(--rf-ink-muted);
  font-size: 11px;
}
.home-ref .table-card tbody td {
  padding: 16px 18px;
  font-size: 14px;
  color: var(--rf-ink);
  border-top: 1px solid var(--rf-border);
  vertical-align: middle;
}
.home-ref .table-card tbody tr:first-child td { border-top: none; }
.home-ref .table-card tbody tr:hover { background: #FAFAFA; }

.home-ref .name-cell { color: var(--rf-ink); font-weight: 500; }
.home-ref .name-wrap .type-icon-sm { color: var(--rf-ink-muted); }

.home-ref .link-cell { color: var(--rf-ink-soft); }
.home-ref .url-col .row-icon-btn { color: var(--rf-ink-muted); }
.home-ref .updated-cell { color: var(--rf-ink-muted); font-size: 12px; }
.home-ref .status-stack { gap: 4px; }

/* Status pills with colored dots */
.home-ref .pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid var(--rf-border-strong);
  color: var(--rf-ink-soft);
  text-transform: none;
}
.home-ref .pill::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex: none;
}
.home-ref .pill-active  { background: var(--rf-green-bg); color: var(--rf-green-ink); border-color: transparent; }
.home-ref .pill-paused  { background: var(--rf-yellow-bg); color: var(--rf-yellow-ink); border-color: transparent; }
.home-ref .pill-stopped { background: var(--rf-red-bg); color: var(--rf-red-ink); border-color: transparent; }
.home-ref .pill-draft   { background: #F1F1F1; color: var(--rf-ink-muted); border-color: transparent; }

/* Variant pills */
.home-ref .cell-pills { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.home-ref .cell-pill {
  background: var(--rf-surface);
  border: 1px solid var(--rf-border-strong);
  color: var(--rf-ink-soft);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 999px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.home-ref .cell-pill-winner {
  background: var(--rf-orange-bg);
  color: var(--rf-orange-ink);
  border-color: var(--rf-orange-border);
}
.home-ref .cell-pill-more { color: var(--rf-ink-muted); background: var(--rf-surface); }

/* More-button */
.home-ref .more-btn {
  color: var(--rf-ink-muted);
  background: transparent;
  border: none;
}
.home-ref .more-btn:hover { background: #F2F2F2; }

/* Explore section (kept at bottom) */
.home-ref .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.home-ref .explore-card {
  background: var(--rf-surface);
  border: 1px solid var(--rf-border);
  border-radius: var(--rf-radius);
  padding: 18px;
  box-shadow: none;
}
.home-ref .explore-title { color: var(--rf-ink); font-weight: 600; }
.home-ref .explore-desc { color: var(--rf-ink-muted); }
.home-ref .explore-emoji { filter: none; }
</style>
</head>

<script>
  // ---- Menus ----
  function closeAllMenus(except) {
    document.querySelectorAll('.more-menu.open, .date-picker-menu.open').forEach(m => {
      if (m.id !== except) m.classList.remove('open');
    });
    document.querySelectorAll('.filter-chip.is-open').forEach(c => {
      if (c.id !== except) {
        c.classList.remove('is-open');
        if (c.id === 'filter-add') {
          ANALYTICS_ADD_OPEN = false;
          ANALYTICS_FILTER_OPEN = null;
          document.querySelectorAll('.filter-section.is-open').forEach(s=>s.classList.remove('is-open'));
        }
      }
    });
  }
  document.addEventListener('click', () => closeAllMenus());

  function toggleDatePicker(id, ev) {
    ev.stopPropagation();
    closeAllMenus(id + '-menu');
    document.getElementById(id + '-menu').classList.toggle('open');
  }
  function selectDate(id, label, ev) {
    ev.stopPropagation();
    document.getElementById(id + '-label').textContent = label;
    const menu = document.getElementById(id + '-menu');
    menu.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
    ev.target.classList.add('active');
    menu.classList.remove('open');
  }

  // Filter table rows by status pill
  function setStatusFilter(sectionId, status, ev) {
    if (ev) ev.stopPropagation();
    const sec = document.getElementById(sectionId);
    if (!sec) return;
    const filterId = sectionId === 'section-table' ? 'sf-funnels' : 'sf-experiments';
    // Update label + active state
    const label = document.getElementById(filterId + '-label');
    if (label) label.textContent = 'Status: ' + status;
    const menu = document.getElementById(filterId + '-menu');
    if (menu) {
      menu.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
      if (ev && ev.target) ev.target.classList.add('active');
      menu.classList.remove('open');
    }
    // Filter rows
    const rows = sec.querySelectorAll('tbody tr');
    rows.forEach(row => {
      const pill = row.querySelector('.pill');
      const text = pill ? pill.textContent.trim() : '';
      row.style.display = (status === 'All' || text === status) ? '' : 'none';
    });
  }
  function toggleMoreMenu(id, ev) {
    ev.stopPropagation();
    closeAllMenus(id);
    document.getElementById(id).classList.toggle('open');
  }
  function menuAction(action, row) {
    console.log(action + ' on row ' + row);
    closeAllMenus();
  }

  // ---- Table sorting ----
  let sortState = { key: null, dir: 'asc' };
  function sortTable(key) {
    const table = document.querySelector('#section-table table');
    if (!table) return;
    const tbody = table.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));
    if (sortState.key === key) {
      sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
    } else {
      sortState.key = key;
      sortState.dir = 'asc';
    }
    rows.sort((a, b) => {
      let av = a.dataset[key];
      let bv = b.dataset[key];
      if (['visitors', 'conversion', 'status'].includes(key)) {
        av = parseFloat(av); bv = parseFloat(bv);
      } else {
        av = (av || '').toLowerCase();
        bv = (bv || '').toLowerCase();
      }
      if (av < bv) return sortState.dir === 'asc' ? -1 : 1;
      if (av > bv) return sortState.dir === 'asc' ? 1 : -1;
      return 0;
    });
    rows.forEach(r => tbody.appendChild(r));
    table.querySelectorAll('thead th.sortable').forEach(th => {
      const arrow = th.querySelector('.sort-arrow');
      th.classList.remove('sorted');
      if (th.dataset.sort === key) {
        th.classList.add('sorted');
        arrow.textContent = sortState.dir === 'asc' ? '▲' : '▼';
      } else {
        arrow.textContent = '▲▼';
      }
    });
  }

  // ---- Composer expand / collapse ----
  function expandComposer(scope) {
    const composer = document.getElementById('composer-' + scope);
    if (!composer) return;
    if (composer.classList.contains('expanded')) return;
    composer.classList.add('expanded');
    // Smoothly bring the form into view once it's rendered
    requestAnimationFrame(() => {
      const form = composer.querySelector('.composer-form');
      if (form) form.scrollTop = 0;
    });
  }

  // ---- Chip single-select within a group ----
  function toggleQChip(el) {
    const group = el.closest('[data-qgroup]');
    if (!group) return;
    const wasSelected = el.classList.contains('selected');
    // Clear other selections in the same group
    group.querySelectorAll('.q-chip.selected').forEach(c => c.classList.remove('selected'));
    if (!wasSelected) el.classList.add('selected');
  }

  // ---- Generate → Open Funnel Builder ----
  function generateFunnel(scope) {
    const composer = document.getElementById('composer-' + scope);
    if (composer) {
      const btn = composer.querySelector('.continue-btn');
      if (btn) {
        btn.innerHTML = 'Generating… ✨';
        btn.disabled = true;
        btn.style.opacity = '0.85';
      }
    }
    setTimeout(() => switchView('funnel-builder'), 650);
  }

  // ---- Builder grid population ----
  const SKELETON_VARIANTS = [
    'v-welcome', 'v-question', 'v-question', 'v-interstitial',
    'v-question', 'v-leadgen', 'v-result', 'v-plans'
  ];
  // Friendly screen-type labels (used in Edit mode list & section header)
  const VARIANT_LABELS = {
    'v-welcome':      'Welcome',
    'v-question':     'Question',
    'v-interstitial': 'Interstitial',
    'v-leadgen':      'Lead capture',
    'v-result':       'Result',
    'v-plans':        'Plans'
  };
  // Per-card editable content (Eyebrow / Headline / Body)
  // Mirrors the field model from the attached Editor screenshot — uses field NAMES only.
  const CARD_CONTENT = []; // populated by renderFunnelGrid()
  let CURRENT_CARD = 0;
  let CURRENT_TAB  = 'preview';

  function buildCardContent(variant, idx) {
    const screen = VARIANT_LABELS[variant] || 'Screen';
    const lower = screen.toLowerCase();
    const num = String(idx + 1).padStart(2, '0');
    return {
      variant,
      num,
      label: screen,
      // New editable fields (Logo & Hero image are images; rest are text)
      logo:      `appgroo-logo.svg`,
      title:     `${screen} ${num} fixture title`,
      subtitle:  `Subtitle for ${lower} ${num}`,
      heroImage: `hero-${lower}-${num}.png`,
      body:      `Body for ${lower} ${num}`,

  // ---- Builder sub-header tab switching ----
  function switchBuilderTab(tab) {
    CURRENT_TAB = tab;
    document.querySelectorAll('.builder-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    document.querySelectorAll('.builder-tab-pane').forEach(p => {
      p.classList.toggle('active', p.dataset.pane === tab);
    });
    // Re-render Edit pane when entering it (in case content changed)
    if (tab === 'edit') {
      renderEditList();
      renderEditCanvas();
      renderEditFields();
    }

  // ---- Publish: "More" toggle for optional fields ----
  function togglePublishMore(btn) {
    const fields = btn.nextElementSibling;
    const isOpen = btn.classList.toggle('is-open');
    if (isOpen) {
      fields.style.display = 'flex';
      btn.querySelector('span').textContent = 'Less';
    } else {
      fields.style.display = 'none';
      btn.querySelector('span').textContent = 'More';
    }
  }

  // ---- Publish checkbox → enable CTA ----
  function togglePublishBtn(checkbox) {
    const btn = document.getElementById('publish-cta-btn');
    if (btn) btn.classList.toggle('disabled', !checkbox.checked);
  }

  // ---- Chat sidebar collapse ----
  function toggleChatCollapse(forceCollapse) {
    const isCollapsed = document.body.classList.contains('is-chat-collapsed');
    const next = (typeof forceCollapse === 'boolean') ? forceCollapse : !isCollapsed;
    document.body.classList.toggle('is-chat-collapsed', next);
  }

  // ---- Open card in Edit mode (triggered by card click) ----

  // ---- Edit mode: render vertical card list (left side panel) ----
  function renderEditList() {
    const list = document.getElementById('edit-card-list');

    if (!list) return;
    if (count) count.textContent = String(CARD_CONTENT.length);
    let html = '';
    CARD_CONTENT.forEach((c, i) => {
      const isSelected = (i === CURRENT_CARD) ? ' selected' : '';

  // ---- Edit mode: render right-side editable fields ----
  function renderEditFields() {
    const wrap = document.getElementById('edit-fields-list');
    const head = document.getElementById('edit-fields-head');
    const c = CARD_CONTENT[CURRENT_CARD];
    if (!wrap || !c) return;
    if (head) head.textContent = `Edit ${c.label || ''} Screen`;
    const fields = [

      { key: 'button',    name: 'Button',   type: 'text',  typeLabel: 'text' }

    fields.forEach(f => {
      const val = c[f.key] || '';
      const nameHtml = `${f.name} <span class="edit-field-type">(${f.typeLabel || f.type})</span>`;
      if (f.type === 'image') {
        const previewClass = f.key === 'logo' ? ' is-logo' : '';

        html += `<div class="edit-field" data-field="${f.key}">

          </div>

      } else {
        html += `<div class="edit-field" data-field="${f.key}">

  // Wire up dirty-state detection so action buttons appear only on change
  function bindEditFieldDirtyState() {
    const c = CARD_CONTENT[CURRENT_CARD];
    if (!c) return;
    // Text fields: dirty when textarea value differs from saved value
    document.querySelectorAll('.edit-field-input').forEach(ta => {
      const key = ta.dataset.field;
      const sync = () => {
        const field = ta.closest('.edit-field');
        if (!field) return;
        const saved = (CARD_CONTENT[CURRENT_CARD] || {})[key] || '';
        field.classList.toggle('is-dirty', ta.value !== saved);
      };
      ta.addEventListener('input', sync);
      ta.addEventListener('blur',  sync);
    });
    // Image fields: clicking the preview triggers Replace (preview is the change trigger)
    document.querySelectorAll('.edit-field-image-preview').forEach(prev => {
      prev.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const field = prev.closest('.edit-field');
        if (!field) return;
        const replaceBtn = field.querySelector('.edit-action-replace');
        if (replaceBtn) replaceBtn.click();
      });
    });
  }

  // Image-field actions (no real upload — just simulate Replace + Revert)
  function replaceImageField(btn) {
    const field = btn.closest('.edit-field');
    const key   = field && field.dataset.field;
    const fn    = field && field.querySelector('.edit-field-image-filename');
    const c     = CARD_CONTENT[CURRENT_CARD];
    if (!c || !key) return;
    const stamp = Date.now().toString(36).slice(-4);
    const newName = key === 'logo' ? `logo-${stamp}.svg` : `hero-${stamp}.png`;
    c[key] = newName;
    if (fn) fn.textContent = newName;
    if (field) field.classList.add('is-dirty'); // image was changed → reveal actions
    flashAction(btn, 'Replaced');
  }
  function revertImageField(btn) {
    const field = btn.closest('.edit-field');
    const key   = field && field.dataset.field;
    const fn    = field && field.querySelector('.edit-field-image-filename');
    const c     = CARD_CONTENT[CURRENT_CARD];
    if (!c || !key) return;
    const orig  = buildCardContent(c.variant, parseInt(c.num, 10) - 1)[key];
    c[key] = orig;
    if (fn) fn.textContent = orig;
    if (field) field.classList.remove('is-dirty'); // back to clean → hide actions
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, ch => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'
    }[ch]));
  }

  // Apply: persist textarea value to card data + canvas, mark field clean
  function applyEditField(btn) {
    const field = btn.closest('.edit-field');
    const ta    = field && field.querySelector('textarea');
    if (!ta) return;
    const key = ta.dataset.field;
    const c   = CARD_CONTENT[CURRENT_CARD];
    if (!c) return;
    c[key] = ta.value;
    renderEditCanvas();
    if (field) field.classList.remove('is-dirty'); // saved → hide actions
  }
  // Revert: restore textarea to current saved value, mark field clean
  function revertEditField(btn) {
    const field = btn.closest('.edit-field');
    const ta    = field && field.querySelector('textarea');
    if (!ta) return;
    const key = ta.dataset.field;
    const c   = CARD_CONTENT[CURRENT_CARD];
    if (!c) return;
    ta.value = c[key] || '';
    if (field) field.classList.remove('is-dirty'); // back to saved → hide actions
  }
  function flashAction(btn, label) {
    const orig = btn.innerHTML;
    btn.innerHTML = label;
    btn.style.color = 'var(--accent-ink)';
    btn.style.borderColor = 'var(--accent-soft)';
    btn.style.background = 'var(--accent-soft)';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.color = '';
      btn.style.borderColor = '';
      btn.style.background = '';
    }, 1100);
  }

  function bindBuilderSidebar() {
    const input = document.querySelector('.sidebar-input');
    const send = document.querySelector('.sidebar-send');
    if (!input || !send) return;
    const sync = () => {
      send.classList.toggle('disabled', !input.value.trim());
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    };
    input.addEventListener('input', sync);
    sync();
  }

    root.innerHTML = '';
    root.appendChild(tpl.content.cloneNode(true));
    document.querySelectorAll('.proto-link').forEach(a => {
      a.classList.toggle('active', a.dataset.view === name);

    document.body.classList.toggle('view-builder', name === 'funnel-builder');

    document.body.classList.toggle('view-landing', name === 'landing');
    document.body.classList.toggle('view-audit', name === 'audit');
    if (name === 'landing') {
      renderLandingPills('web');

  function renderLandingQuizTypes(comboId) {
    const wrap = document.getElementById('landing-quiztypes');
    if (!wrap) return;
    const order = Object.keys(LANDING_PROMPTS[comboId] || {});
    const sorted = LANDING_QUIZ_TYPES.slice().sort(
      (a, b) => order.indexOf(a.key) - order.indexOf(b.key)
    );
    const top = sorted.slice(0, 3);
    const rest = sorted.slice(3);
    const pill = (t, extra = '') =>
      `<button type="button" class="ld-pill ld-pill--type${extra}" data-combo="${comboId}" data-type="${t.key.replace(/"/g, '&quot;')}" onclick="pasteLandingPrompt(this)">${t.label}</button>`;

      ? `<button type="button" class="ld-pill ld-pill--more" onclick="expandLandingQuizTypes(this)">More +${rest.length}</button>`
      : '';
    wrap.innerHTML =
      top.map(t => pill(t)).join('') +
      rest.map(t => pill(t, ' is-hidden')).join('') +
      moreBtn;
    wrap.hidden = false;

    const willOpen = menu.hidden;
    menu.hidden = !willOpen;

        menu.hidden = true;
        btn.setAttribute('aria-expanded', 'false');

        document.removeEventListener('keydown', esc);

  // ---- Deterministic daily-series generator ----
  function genSeries(seed, base, n) {
    const out = [];
    for (let i = 0; i < n; i++) {
      const s = Math.sin(seed + i * 0.68) * 0.55
              + Math.sin(seed * 1.7 + i * 1.23) * 0.35
              + Math.sin(seed * 0.4 + i * 2.1)  * 0.10;
      out.push(Math.round(Math.max(base * 0.35, base * (1 + i * 0.011) + s * base * 0.28)));
    }
    return out;
  }

  // ---- Number formatter ----

  // ---- Line chart SVG ----
  function buildLineChart(data) {
    const W=760, H=165, pL=48, pR=12, pT=12, pB=36;
    const cW=W-pL-pR, cH=H-pT-pB, n=data.length;
    const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
    const pts = data.map((v,i) => ({
      x: pL+(i/(n-1))*cW,
      y: pT+(1-(v-mn)/rng)*cH
    }));
    let d=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for (let i=1; i<pts.length; i++) {
      const cpx=((pts[i-1].x+pts[i].x)/2).toFixed(1);
      d+=` C ${cpx} ${pts[i-1].y.toFixed(1)} ${cpx} ${pts[i].y.toFixed(1)} ${pts[i].x.toFixed(1)} ${pts[i].y.toFixed(1)}`;
    }
    const lp=pts[pts.length-1], fp=pts[0];
    const area=`${d} L ${lp.x.toFixed(1)} ${(pT+cH).toFixed(1)} L ${fp.x.toFixed(1)} ${(pT+cH).toFixed(1)} Z`;
    const yLbls=[mx, Math.round((mx+mn)/2), mn].map((v,i)=>{
      const y=(pT+(i/2)*cH).toFixed(1);
      return `<text x="${pL-8}" y="${(+y+4).toFixed(1)}" text-anchor="end" font-size="10.5" fill="var(--ink-dim)">${v>=1000?(v/1000).toFixed(1)+'k':v}</text>`;
    }).join('');
    const xLbls=[0,7,14,21,29].map(idx=>{
      const x=(pL+(idx/(n-1))*cW).toFixed(1);
      const ago=n-1-idx;
      return `<text x="${x}" y="${(H-5).toFixed(1)}" text-anchor="middle" font-size="10.5" fill="var(--ink-dim)">${ago===0?'Today':ago+'d ago'}</text>`;
    }).join('');
    const grid=[0,0.5,1].map(t=>`<line x1="${pL}" y1="${(pT+t*cH).toFixed(1)}" x2="${(W-pR)}" y2="${(pT+t*cH).toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`).join('');
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;overflow:visible">
      <defs><linearGradient id="lg-a" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.01"/>
      </linearGradient></defs>
      ${grid}${yLbls}
      <path d="${area}" fill="url(#lg-a)"/>
      <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lp.x.toFixed(1)}" cy="${lp.y.toFixed(1)}" r="3.5" fill="var(--accent)" stroke="var(--surface)" stroke-width="2"/>
      ${xLbls}
    </svg>`;
  }

  // ---- Step-by-step bar chart SVG ----
  function buildStepChart(steps) {
    if (!steps || !steps.length)
      return '<div class="chart-empty">No step data yet — launch the funnel to start tracking.</div>';
    const W=760, H=268, pL=52, pR=12, pT=14, pB=56;
    const cW=W-pL-pR, cH=H-pT-pB, n=steps.length;
    const slotW=cW/n, bW=Math.max(22,Math.min(54,slotW*0.58));
    let els='';
    // Y-axis grid
    [0,25,50,75,100].forEach(pct=>{
      const y=(pT+(1-pct/100)*cH).toFixed(1);
      const vl=pct===0?'0':pct===100?fmtNum(steps[0].v):fmtNum(Math.round(steps[0].v*pct/100));
      els+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="var(--line)" stroke-width="1" ${pct>0?'stroke-dasharray="3,4"':''}/>`;
      els+=`<text x="${pL-8}" y="${(+y+4).toFixed(1)}" text-anchor="end" font-size="10.5" fill="var(--ink-dim)">${vl}</text>`;
    });
    steps.forEach((step,i)=>{
      const bx=(pL+i*slotW+(slotW-bW)/2).toFixed(1);
      const cx=(pL+i*slotW+slotW/2).toFixed(1);
      const bH=(step.pct/100)*cH;
      const by=(pT+cH-bH).toFixed(1);
      // drop segment
      if(i>0){
        const prev=steps[i-1]; const prevBH=(prev.pct/100)*cH;
        const prevBy=(pT+cH-prevBH).toFixed(1);
        const dH=(prevBH-bH).toFixed(1);
        if(+dH>0){
          els+=`<rect x="${bx}" y="${prevBy}" width="${bW.toFixed(1)}" height="${dH}" rx="3" fill="var(--danger-bg)" fill-opacity="0.85"/>`;
          if(+dH>13){
            const drop=(prev.pct-step.pct).toFixed(1);
            els+=`<text x="${cx}" y="${(+prevBy+(+dH)/2+4).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="var(--danger)" font-weight="600">−${drop}%</text>`;
          }
        }
      }
      const op=Math.max(0.52,1-i*0.055).toFixed(2);
      els+=`<rect x="${bx}" y="${by}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" rx="4" fill="var(--accent)" opacity="${op}"/>`;
      if(bH>28){
        els+=`<text x="${cx}" y="${(+by+16).toFixed(1)}" text-anchor="middle" font-size="10" fill="white" font-weight="700">${fmtNum(step.v)}</text>`;
      }
      els+=`<text x="${cx}" y="${(pT+cH+18).toFixed(1)}" text-anchor="middle" font-size="10.5" fill="var(--ink-soft)">${step.label}</text>`;
      els+=`<text x="${cx}" y="${(pT+cH+32).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--ink-dim)">${step.pct}%</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;overflow:visible">${els}</svg>`;
  }

  // ---- Per-variant colors (experiments) ----
  const VAR_COLORS = ['var(--ink-soft)', 'var(--accent)', 'var(--success)', 'var(--accent-ink)', 'var(--danger)'];

  // Per-variant filter for the Performance block (null = "Total / All variants")
  var EXP_VARIANT_FILTER  = null;
  var EXP_SELECTED_METRIC = 'visited';

  // Returns the versions array used by the Performance charts/cards,
  // each entry annotated with its original index so colors stay stable.
  function filteredExpVersions(e) {
    if (EXP_VARIANT_FILTER === null) {
      return e.versions.map((v, i) => Object.assign({}, v, { _origIdx: i }));
    }
    const v = e.versions[EXP_VARIANT_FILTER];
    return v ? [Object.assign({}, v, { _origIdx: EXP_VARIANT_FILTER })] : [];
  }

  function setExpVariantFilter(eid, filterIdx) {
    EXP_VARIANT_FILTER = (filterIdx === null || typeof filterIdx === 'undefined') ? null : filterIdx;
    const e = EXPERIMENTS[eid]; if (!e) return;

  // ---- Multi-line chart for experiments (one line per variant + legend) ----
  function buildExpLineChart(baseData, versions) {
    if (!baseData || !versions || !versions.length)
      return '<div class="chart-empty">No data yet.</div>';
    const W=760, H=190, pL=48, pR=12, pT=12, pB=36;
    const cW=W-pL-pR, cH=H-pT-pB, n=baseData.length;
    const allSeries = versions.map((v, idx) => {
      const cIdx = (typeof v._origIdx === 'number') ? v._origIdx : idx;
      const splitFrac = (v.split||0)/100;
      const factor = 1 + (cIdx === 0 ? 0 : (cIdx*0.5 - 0.25) * 0.06);
      const data = baseData.map((val,i)=>{
        const w = Math.sin(cIdx*1.31 + i*0.7) * 0.06 + Math.cos(cIdx*0.71 + i*0.42) * 0.04;
        return Math.max(0, Math.round(val * splitFrac * factor * (1 + w)));
      });
      return { name: v.name, color: variantColor(cIdx), data, isLeading: !!v.isWinner };
    });
    let mn=Infinity, mx=-Infinity;
    allSeries.forEach(s => s.data.forEach(v => { if (v<mn) mn=v; if (v>mx) mx=v; }));
    const rng = (mx-mn) || 1;
    const yLbls=[mx, Math.round((mx+mn)/2), mn].map((v,i)=>{
      const y=(pT+(i/2)*cH).toFixed(1);
      return `<text x="${pL-8}" y="${(+y+4).toFixed(1)}" text-anchor="end" font-size="10.5" fill="var(--ink-dim)">${v>=1000?(v/1000).toFixed(1)+'k':v}</text>`;
    }).join('');
    const xLbls=[0,7,14,21,29].map(idx=>{

  // ---- Multi-bar step chart for experiments ----
  function buildExpStepChart(steps, versions) {
    if (!steps || !steps.length || !versions || !versions.length)
      return '<div class="chart-empty">No step data yet &mdash; launch the funnel to start tracking.</div>';
    const W=760, H=300, pL=52, pR=12, pT=14, pB=72;
    const cW=W-pL-pR, cH=H-pT-pB, n=steps.length, V=versions.length;
    const slotW=cW/n;
    const groupPad = 16;
    const groupW = Math.max(28, Math.min(slotW - groupPad, slotW * 0.78));
    const bW = Math.max(8, (groupW - (V-1)*3) / V);

    // Pre-compute per-variant per-step values & find the global max so the
    // tallest bar fills the chart's full height.
    const colorIdx = (v, vi) => (typeof v._origIdx === 'number') ? v._origIdx : vi;
    const variantStepVal = (step, v, vi) => {
      const cIdx = colorIdx(v, vi);
      const splitFrac = (v.split||0)/100;
      const factor = 1 + (cIdx === 0 ? 0 : (cIdx*0.7 - 0.35) * 0.05);
      return Math.max(0, Math.round(step.v * splitFrac * factor));
    };
    let scaleMax = 0;
    steps.forEach(step => versions.forEach((v, vi) => {
      const val = variantStepVal(step, v, vi);
      if (val > scaleMax) scaleMax = val;
    }));
    scaleMax = scaleMax || 1;

    let els='';
    [0,25,50,75,100].forEach(pct=>{
      const y=(pT+(1-pct/100)*cH).toFixed(1);
      const vl=pct===0?'0':fmtNum(Math.round(scaleMax*pct/100));
      els+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="var(--line)" stroke-width="1" ${pct>0?'stroke-dasharray="3,4"':''}/>`;
      els+=`<text x="${pL-8}" y="${(+y+4).toFixed(1)}" text-anchor="end" font-size="10.5" fill="var(--ink-dim)">${vl}</text>`;
    });
    steps.forEach((step, si) => {
      const groupCx = pL + si*slotW + slotW/2;
      const groupX0 = groupCx - groupW/2;
      const prevStep = si > 0 ? steps[si-1] : null;
      versions.forEach((v, vi) => {
        const val = variantStepVal(step, v, vi);
        const bH = Math.max(0, (val / scaleMax) * cH);
        const bx = groupX0 + vi*(bW + 3);
        const by = pT + cH - bH;
        const color = variantColor(colorIdx(v, vi));

        // Hover tooltip: show variant + step + drop-off vs previous step
        let tipText = `${v.name} — ${step.label}: ${fmtNum(val)}`;
        if (prevStep) {
          const prevVal = variantStepVal(prevStep, v, vi);
          if (prevVal > 0) {
            const dropPct = ((prevVal - val) / prevVal) * 100;
            const sign = dropPct >= 0 ? '−' : '+';
            tipText += `\nDrop-off: ${sign}${Math.abs(dropPct).toFixed(1)}% vs ${prevStep.label}`;
          }
        }

        els += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" rx="3" fill="${color}" opacity="0.92" style="cursor:default"><title>${tipText}</title></rect>`;
        if (bH > 22) {
          els += `<text x="${(bx+bW/2).toFixed(1)}" y="${(by+13).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="white" font-weight="700" pointer-events="none">${fmtNum(val)}</text>`;
        }
      });
      els += `<text x="${groupCx.toFixed(1)}" y="${(pT+cH+22).toFixed(1)}" text-anchor="middle" font-size="11" fill="var(--ink-soft)" font-weight="600">${step.label}</text>`;
    });
    const legend = `<div class="chart-legend">` + versions.map((v,i) =>
      `<span class="chart-legend-item"><span class="chart-legend-bar-swatch" style="background:${variantColor(colorIdx(v, i))}"></span><span class="chart-legend-name">${v.name}</span></span>`
    ).join('') + `</div>`;
    return `${legend}<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;overflow:visible">${els}</svg>`;
  }

  function genAnalyticsSeries(metric, n) {
    const seedMap = { revenue:11, arpu:13, arppu:17, churn:19, subs:23, visitors:29, cr:31, paySuccess:37, dispute:41, mrr:43 };

  function buildAnalyticsLineChart(metric) {
    const n = 30;
    const cur = genAnalyticsSeries(metric, n);
    const prev = cur.map((v,i)=> Math.round(v * (0.78 + Math.sin(i*0.45+1.7)*0.07)));
    const W=760, H=200, pL=58, pR=14, pT=10, pB=32;
    const cW=W-pL-pR, cH=H-pT-pB;
    const all = cur.concat(prev);
    const mn=Math.min(...all), mx=Math.max(...all); const rng = (mx-mn)||1;
    const fmtY = v => {
      if (metric.format === '$') return '$' + (v>=1000 ? (v/1000).toFixed(1)+'k' : v.toLocaleString());
      if (metric.format === '%') return v.toFixed(1) + '%';
      return v >= 1000 ? (v/1000).toFixed(1)+'k' : v.toLocaleString();
    };
    const yLbls = [mx, mn+(mx-mn)*0.75, mn+(mx-mn)*0.5, mn+(mx-mn)*0.25, mn].map((v,i)=>{
      const y=(pT+(i/4)*cH).toFixed(1);
      return `<text x="${pL-8}" y="${(+y+4).toFixed(1)}" text-anchor="end" font-size="10.5" fill="var(--ink-dim)">${fmtY(Math.round(v))}</text>`;
    }).join('');
    const grid = [0,0.25,0.5,0.75,1].map(t=>`<line x1="${pL}" y1="${(pT+t*cH).toFixed(1)}" x2="${W-pR}" y2="${(pT+t*cH).toFixed(1)}" stroke="var(--line)" stroke-width="1" ${t>0&&t<1?'stroke-dasharray="3,4"':''}/>`).join('');

    function pathFor(arr) {
      const pts = arr.map((v,i)=>({x:pL+(i/(n-1))*cW, y:pT+(1-(v-mn)/rng)*cH}));
      let d=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
      for (let i=1; i<pts.length; i++) {
        const cpx=((pts[i-1].x+pts[i].x)/2).toFixed(1);
        d+=` C ${cpx} ${pts[i-1].y.toFixed(1)} ${cpx} ${pts[i].y.toFixed(1)} ${pts[i].x.toFixed(1)} ${pts[i].y.toFixed(1)}`;
      }
      return { d, last: pts[pts.length-1] };
    }
    const cP = pathFor(cur);
    const pP = pathFor(prev);
    const areaD = `${cP.d} L ${(pL+cW).toFixed(1)} ${(pT+cH).toFixed(1)} L ${pL.toFixed(1)} ${(pT+cH).toFixed(1)} Z`;
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block;overflow:visible">
      <defs><linearGradient id="ag-${metric.key}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
      </linearGradient></defs>
      ${grid}${yLbls}
      <path d="${areaD}" fill="url(#ag-${metric.key})"/>
      <path d="${pP.d}" fill="none" stroke="var(--ink-dim)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,4" opacity="0.85"/>
      <path d="${cP.d}" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }
