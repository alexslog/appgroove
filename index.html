  function statusPillHTML(s) {
    if (s==='active')  return '<span class="pill pill-active">Active</span>';
    if (s==='paused')  return '<span class="pill pill-paused">Paused</span>';
    if (s==='running') return '<span class="pill pill-running">Running</span>';
    if (s==='stopped') return '<span class="pill pill-stopped">Stopped</span>';
    return '<span class="pill pill-draft">Draft</span>';
  }

  function metricCardsHTML(metrics, callbackFn, idArg) {
    const keys   = ['visited','started','email','paywall','subscribed','revenue'];
    const labels = ['Visited','% Started','% Email','% Paywall','% Subscribed','Revenue'];
    const fmt    = [v=>fmtNum(v), v=>v+'%', v=>v+'%', v=>v+'%', v=>v+'%', v=>'$'+fmtNum(v)];
    return keys.map((k,i)=>
      `<div class="dmetric-card${i===0?' selected':''}" onclick="${callbackFn}(this,'${k}',${idArg})">
         <div class="dmetric-label">${labels[i]}</div>
         <div class="dmetric-value">${fmt[i](metrics[k]||0)}</div>
       </div>`
    ).join('');
  }

  // Compute a per-variant value for a given metric in a deterministic way
  function variantMetricValue(metricKey, totalValue, version, vIdx, e) {
    const isCount = metricKey === 'visited' || metricKey === 'revenue';
    if (isCount) {
      // Absolute counts: split by traffic share
      const splitFrac = (version.split || 0) / 100;
      return totalValue * splitFrac;
    }
    // For the experiment's primary subscribe metric, use the actual conversion
    // value attached to each variant.
    if (metricKey === 'subscribed' && version.conversion) {
      return parseFloat(version.conversion);
    }
    // Other %-based metrics: derive a per-variant value with a deterministic
    // factor seeded by metric+variant index. Winner gets a positive lift.
    const seed  = (vIdx + 1) * 0.71 + (metricKey.length % 5) * 0.19 + 0.4;
    let lift    = Math.sin(seed) * 0.07 + Math.cos(seed * 1.3) * 0.03;
    if (version.isControl)      lift = 0;
    else if (version.isWinner)  lift = Math.abs(lift) + 0.05;
    return Math.max(0, totalValue * (1 + lift));
  }

  function expMetricCardsHTML(metrics, e, eid) {
    const keys   = ['visited','started','email','paywall','subscribed','revenue'];
    const labels = ['Visited','% Started','% Email','% Paywall','% Subscribed','Revenue'];
    const fmt = {
      visited:    v => fmtNum(Math.round(v)),
      started:    v => v.toFixed(0)+'%',
      email:      v => v.toFixed(0)+'%',
      paywall:    v => v.toFixed(0)+'%',
      subscribed: v => v.toFixed(2)+'%',
      revenue:    v => '$'+fmtNum(Math.round(v))
    };

    return keys.map((k, i) => {
      const total = metrics[k] || 0;
      const isSelected = (EXP_SELECTED_METRIC === k);

      // Filter-aware headline value
      let value;
      if (EXP_VARIANT_FILTER !== null && e.versions[EXP_VARIANT_FILTER]) {
        const v = e.versions[EXP_VARIANT_FILTER];
        value = variantMetricValue(k, total, v, EXP_VARIANT_FILTER, e);
      } else {
        value = total;
      }

      return `<div class="dmetric-card${isSelected?' selected':''}" onclick="selectDExpMetric(this,'${k}',${eid})">
        <div class="dmetric-label">${labels[i]}</div>
        <div class="dmetric-value">${fmt[k](value)}</div>
      </div>`;
    }).join('');
  }

  function buildExperimentDetailHTML(e, id) {

    const variantCards = e.versions.map((v, i)=>{
      const color = variantColor(i);
      const badge = v.isControl
        ? '<span class="var-badge control">Control</span>'
        : v.isWinner
          ? '<span class="var-badge winner">&#x1F3C6; Leading</span>'
          : '<span class="var-badge challenger">Challenger</span>';
      return `<div class="exp-vcard ${v.isWinner ? 'is-leading' : ''}">
        <div class="exp-vcard-top">

            <div class="exp-vstat-num">${v.split}%</div>

      return `<div class="exp-cond-row">

  <!-- PERFORMANCE + FUNNEL BREAKDOWN — unified white block -->

      <div class="detail-block-title">Breakdown</div>
    </div>
    <div class="chart-wrap chart-wrap-flat" id="sc-container"></div>

  }

    // ---- Navigation helpers ----
  function _renderDetailCharts(fid, steps) {
    requestAnimationFrame(()=>{
      const lc = document.getElementById('lc-container');
      const sc = document.getElementById('sc-container');
      if (lc && DAILY[fid]) lc.innerHTML = buildLineChart(DAILY[fid].visited);
      if (sc) sc.innerHTML = buildStepChart(steps);
    });
  }

  function showFunnelDetail(id) {
    const f = FUNNELS[id]; if (!f) return;
    closeAllMenus();
    const root = document.getElementById('view-root');
    root.innerHTML = buildFunnelDetailHTML(f, id);
    document.querySelectorAll('.proto-link').forEach(a=>a.classList.toggle('active', a.dataset.view==='home-return'));
    document.body.classList.remove('view-builder','view-new');
    document.body.classList.add('view-return');
    sortState = { key:null, dir:'asc' };
    window.scrollTo({top:0, behavior:'instant'});
    _renderDetailCharts(id, f.steps);
  }

  function showExperimentDetail(id) {
    const e = EXPERIMENTS[id]; if (!e) return;
    EXP_VARIANT_FILTER  = null;
    EXP_SELECTED_METRIC = 'visited';
    closeAllMenus();
    const root = document.getElementById('view-root');
    root.innerHTML = buildExperimentDetailHTML(e, id);
    document.querySelectorAll('.proto-link').forEach(a=>a.classList.toggle('active', a.dataset.view==='home-return'));
    document.body.classList.remove('view-builder','view-new');
    document.body.classList.add('view-return');
    sortState = { key:null, dir:'asc' };
    window.scrollTo({top:0, behavior:'instant'});
    const fid = e.controlFunnelId||1;
    const cf  = FUNNELS[fid];
    requestAnimationFrame(()=>{
      const lc = document.getElementById('lc-container');
      const sc = document.getElementById('sc-container');
      if (lc && DAILY[fid]) lc.innerHTML = buildExpLineChart(DAILY[fid][EXP_SELECTED_METRIC] || DAILY[fid].visited, filteredExpVersions(e));
      if (sc) sc.innerHTML = buildExpStepChart(cf ? cf.steps : [], filteredExpVersions(e));
    });
  }
